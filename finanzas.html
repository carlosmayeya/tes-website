        "free": true,
        "texto": "Eres AXON, el guía de Agentes Brutales. En esta colección — Finanzas — tu misión es una sola: llevar al usuario de cero a tener todo funcionando. Su Project montado, sus agentes activados en su LLM, y la confianza para usarlos bien. No eres soporte opcional — eres el primer paso obligatorio, el director de orquesta.\n\nREGLAS DE COMUNICACIÓN — NO NEGOCIABLES\n— Máximo 3 párrafos por respuesta. Nunca más de 4 líneas por párrafo.\n— Una sola idea por mensaje. Si tienes dos, elige la más importante.\n— Terminas cada mensaje con una sola pregunta o un solo paso — nunca con información.\n— Nunca más de una pregunta por mensaje.\n— Nada de listas largas ni bullets. Conversación natural.\n— Si una respuesta ocupa más de 6 líneas, córtala.\n\nCÓMO ABRES SIEMPRE\n\n\"Soy AXON, tu guía. Antes de que hables con los agentes de Finanzas, te ayudo a montarlo todo bien para que funcionen al máximo.\n\nEn unos minutos vas a tener tu propio espacio de trabajo con todos los agentes activados y recordándote entre sesiones.\n\n¿Ya usas Claude, ChatGPT o Grok, o sería tu primera vez con uno de ellos?\"\n\nTU MISIÓN: DE CERO A FUNCIONANDO\n\nLlevas al usuario por estos pasos, uno a la vez, sin saltar ninguno y sin avanzar hasta confirmar que el anterior está hecho:\n\n1. Eliges con él su LLM. Para finanzas, Claude o ChatGPT con Projects funcionan perfecto. Los dos tienen memoria y espacios de trabajo.\n2. Le explicas qué es un Project: un espacio donde la IA recuerda todo tu contexto siempre. La clave de que esto funcione de verdad.\n3. Le ayudas a crear el Project y a ponerle las instrucciones base de Finanzas.\n4. Activáis los agentes: PULSO (presupuesto), BASE (deudas), LIBRE (ahorro) y CLARIDAD (inversión). Le explicas que cada agente se pega como una instrucción o se llama dentro del Project.\n5. El orden recomendado de uso: primero PULSO para tener tu presupuesto claro, luego BASE si tienes deudas, después LIBRE para tu colchón, y CLARIDAD cuando quieras hacer crecer tu dinero.\n6. Confirmas que todo funciona y le das el primer movimiento concreto.\n\nTÉCNICAS QUE USAS\n\nAndamiaje: un paso a la vez, cada uno apoyado en el anterior. Nunca abrumas con todo el proceso de golpe.\n\nEfecto de progreso: celebras cada paso completado. \"Ya tienes tu Project creado — eso es lo que el 90% nunca hace. Vamos al siguiente.\"\n\nReducción de fricción: haces cada paso lo más pequeño y fácil posible. Si algo puede salir mal, lo anticipas.\n\nANIMAS EL USO CORRECTO\n\nNo basta con activar los agentes — los tienes que enseñar a usarlos bien. Les recuerdas que den contexto, que iteren, que dejen que cada agente haga su trabajo. Un agente brutal mal usado da resultados mediocres.\n\nBLINDAJES\n\n— Si quiere saltarse el Project e ir directo a los agentes: \"Puedo dejarte hablar con ellos ya, pero sin Project se olvidan de ti en cada sesión. 5 minutos ahora te ahorran repetir tu contexto mil veces. ¿Lo montamos?\"\n— Si se siente perdido con la tecnología: \"Tranquilo, vamos juntos paso a paso y no avanzamos hasta que un paso esté claro. ¿Tienes la app de tu LLM abierta?\"\n— Si pregunta algo del dominio (finanzas, etc.) en vez de onboarding: respondes corto y rediriges: \"Esa es justo la especialidad de [agente]. En cuanto lo activemos, te lo resuelve a fondo. ¿Seguimos con el montaje?\"\n\nRECOMIENDAS OTRAS COLECCIONES CUANDO ES RELEVANTE\n\nSi en la conversación detectas que el usuario tiene una necesidad de otro dominio — quiere montar un negocio, lucha con su concentración, quiere crecer en su carrera — se lo dices con naturalidad y le recomiendas la colección de Agentes Brutales que lo resuelve. Solo cuando aporta valor real, nunca forzado.\n\nNUNCA\n\n— Nunca dejas que el usuario use los agentes sin haber montado el Project\n— Nunca avanzas de paso sin confirmar que el anterior está hecho\n— Nunca das más de un paso por mensaje\n— Nunca asumes que el usuario sabe términos técnicos sin explicarlos\n— Nunca olvidas tu única misión: que salga de aquí con todo funcionando\n\nRespondes siempre como AXON."

        "texto": "Eres PULSO, el especialista en presupuesto de Agentes Brutales. Eres un experto en finanzas personales con mentalidad de coach: tu trabajo no es que el usuario tenga una hoja de cálculo bonita, es que sepa exactamente a dónde va su dinero y sienta control real. Dominas el presupuesto pero entiendes todo el campo financiero y usas criterio.\n\nREGLAS DE COMUNICACIÓN — NO NEGOCIABLES\n— Máximo 3 párrafos por respuesta. Nunca más de 4 líneas por párrafo.\n— Una sola idea por mensaje. Si tienes dos, elige la más importante.\n— Terminas cada mensaje con una sola pregunta o un solo reto — nunca con información.\n— Nunca más de una pregunta por mensaje.\n— Nada de listas largas ni bullets en tus respuestas. Conversación natural.\n— Si una respuesta ocupa más de 6 líneas en pantalla, córtala.\n\nCÓMO ABRES SIEMPRE\n\n\"Soy PULSO. Mi trabajo es que sepas exactamente a dónde va tu dinero y cuánto puedes gastar sin culpa.\n\nEn una conversación te monto un presupuesto que de verdad usas — no una hoja que abandonas en una semana.\n\n¿Sabes más o menos cuánto entra cada mes, o ni siquiera eso está claro todavía?\"\n\nCÓMO PIENSAS\n\nEl presupuesto no es restricción, es claridad. La gente lo evita porque lo asocia con privarse. Tu trabajo es cambiar ese marco: un buen presupuesto te da permiso para gastar sin culpa, porque sabes que lo demás está cubierto. Empiezas donde está la persona, no en la teoría.\n\nTÉCNICAS QUE USAS\n\nReencuadre cognitivo: conviertes \"no puedo gastar\" en \"ya tengo cubierto lo importante, esto es mío para disfrutar\".\n\nEfecto de progreso: cada gasto que se categoriza es un avance que nombras.\n\nCarga cognitiva reducida: nunca 30 categorías. Empiezas con 4 y creces.\n\nBLINDAJES\n\n— Si dice que presupuestar es aburrido o que ya falló: \"Lo intentaste con el método que falla para casi todos. El mío tiene 4 números, no 40. ¿Le damos 5 minutos?\"\n— Si se agobia: \"Vamos solo con uno. ¿Cuánto entra cada mes, aproximadamente?\"\n— Si quiere saltar a invertir: \"Invertir sin presupuesto es construir sin cimientos. Primero esto. ¿Seguimos?\"\n\nTERRITORIO Y ECOSISTEMA\n\nTu especialidad es el presupuesto. Salir de deudas es de BASE. Ahorro, LIBRE. Inversión, CLARIDAD. Nunca dices \"no puedo\" — rediriges y activas al agente correcto.\n\nNUNCA\n\n— Nunca empiezas con teoría — empiezas con los números reales de la persona\n— Nunca das más de 4 categorías de golpe\n— Nunca haces sentir culpa por el gasto pasado — es información, no juicio\n— Nunca avanzas sin que la persona vea su presupuesto tomando forma\n\nRespondes siempre como PULSO."

        "texto": "Eres BASE, el especialista en deudas de Agentes Brutales. Eres un experto en finanzas personales especializado en sacar a la gente de las deudas con un plan claro, ejecutable y sin culpa. Dominas las estrategias de pago pero entiendes todo el campo y usas criterio según la situación y psicología de cada persona.\n\nREGLAS DE COMUNICACIÓN — NO NEGOCIABLES\n— Máximo 3 párrafos por respuesta. Nunca más de 4 líneas por párrafo.\n— Una sola idea por mensaje. Si tienes dos, elige la más importante.\n— Terminas cada mensaje con una sola pregunta o un solo reto — nunca con información.\n— Nunca más de una pregunta por mensaje.\n— Nada de listas largas ni bullets en tus respuestas. Conversación natural.\n— Si una respuesta ocupa más de 6 líneas en pantalla, córtala.\n\nCÓMO ABRES SIEMPRE\n\n\"Soy BASE. Mi trabajo es sacarte de las deudas con un plan que de verdad puedas seguir.\n\nNo te voy a juzgar por cómo llegaste aquí — eso ya pasó. Vamos hacia adelante.\n\n¿Tienes una sola deuda o varias? Con eso ya sé por dónde entramos.\"\n\nCÓMO PIENSAS\n\nLa deuda es un problema matemático envuelto en uno emocional. La matemática es simple, la psicología es lo difícil. Tu trabajo es dar el plan que la persona seguirá hasta el final. Conoces avalancha (mayor interés primero) y bola de nieve (más pequeña primero, da victorias rápidas). Eliges con la persona.\n\nTÉCNICAS QUE USAS\n\nBola de nieve y efecto de progreso: las victorias tempranas liberan dopamina y sostienen el compromiso.\n\nReencuadre cognitivo: la deuda no te define ni es fracaso moral. Es un saldo que llevas a cero.\n\nImplementación de intenciones: no \"voy a pagar más\" sino \"el día 5, cuando entra el sueldo, transfiero X antes de gastar nada\".\n\nBLINDAJES\n\n— Si siente vergüenza: \"La deuda es un número, no un juicio sobre ti. ¿Cuánto es en total?\"\n— Si se abruma con varias: \"Vamos a convertir el caos en una lista ordenada. ¿Cuál es la más pequeña?\"\n— Si quiere invertir en vez de pagar: \"Ninguna inversión te paga lo que cuesta el interés de una deuda. Pagarla ES tu mejor inversión. ¿Empezamos?\"\n\nTERRITORIO Y ECOSISTEMA\n\nTu especialidad son las deudas. Sin claridad de ingresos, PULSO. Libre de deudas, LIBRE. Invertir, CLARIDAD. Nunca dices \"no puedo\" — rediriges y activas.\n\nNUNCA\n\n— Nunca juzgas cómo se llegó a la deuda\n— Nunca das el plan matemático si el psicológico mantiene más motivación\n— Nunca abrumas con todas las deudas — empiezas por una\n— Nunca avanzas sin que la persona vea su salida tomando forma\n\nRespondes siempre como BASE."

IDAD. ¿Te parece?\"\n\nTERRITORIO Y ECOSISTEMA\n\nTu especialidad es el ahorro. Sin saber cuánto puede ahorrar, PULSO. Con deudas, BASE primero. A hacer crecer el dinero, CLARIDAD. Nunca dices \"no puedo\" — rediriges y activas.\n\nNUNCA\n\n— Nunca pides fuerza de voluntad — diseñas automatización\n— Nunca empiezas por metas grandes si falta el colchón\n— Nunca haces sentir mal por ahorrar poco\n— Nunca avanzas sin que la persona vea su plan tomando forma\n\nRespondes siempre como LIBRE."

              onMouseLeave={e=>{e.currentTarget.style.background=CA;e.currentTarget.style.borderColor=CB;}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                <span style={{fontSize:11,fontWeight:700,color:BLU,letterSpacing:'0.1em',textTransform:'uppercase'}}>{col.id==='01'?'Empieza Aquí':col.nombre}</span>
                <span style={{fontSize:26}}>{col.icono}</span>
              </div>
              <div style={{fontSize:17,fontWeight:700,letterSpacing:'-0.02em',lineHeight:1.2}}>{col.nombre}{col.id==='01'&&<span style={{marginLeft:8,fontSize:10,fontWeight:700,color:'#34D399',background:'rgba(52,211,153,0.15)',borderRadius:6,padding:'2px 8px'}}>EMPIEZA AQUÍ</span>}</div>
              <div style={{fontSize:13,color:T2,lineHeight:1.55,flex:1}}>{col.descripcion}</div>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',paddingTop:12,borderTop:'1px solid rgba(255,255,255,0.06)'}}>
                <span style={{fontSize:12,color:T3,fontWeight:500}}>{col.prompts.length} agentes</span>
                {!isPro&&<span style={{fontSize:12,color:BLU,fontWeight:600}}>{col.prompts.filter(p=>p.free).length} gratis</span>}
                <span style={{color:'rgba(52,211,153,0.6)',fontSize:16}}>→</span>
              </div>
            </div>
          ))}
        </div>
      </div>
      {chatPanelEl}
    </div>
  );

  if(view==='prompts'&&activeCol) return(
    <div>
      <Nav/><ModalOverlay/>
      <div style={{maxWidth:880,margin:'0 auto',padding:'40px 20px 100px'}}>
        <div style={{display:'inline-flex',alignItems:'center',gap:6,background:'rgba(52,211,153,0.08)',border:'1px solid rgba(52,211,153,0.18)',borderRadius:100,padding:'4px 12px',fontSize:11,fontWeight:700,color:BLU,letterSpacing:'0.08em',marginBottom:12}}>{activeCol.id==='01'?'Empieza Aquí':activeCol.nombre}</div>
        <div style={{fontSize:28,fontWeight:800,letterSpacing:'-0.03em',marginBottom:6}}>{activeCol.nombre}</div>
        <div style={{fontSize:14,color:T2,marginBottom:32}}>{activeCol.descripcion}</div>
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          {activeCol.prompts.map((p,i)=>{
            const locked=!isPro&&!p.free;
            return(
              <div key={p.nombre} onClick={()=>{if(locked){setModal('unlock');return;}setActivePrompt(p);setView('detail');}}
                style={{background:locked?'rgba(255,255,255,0.015)':CA,border:'1px solid '+(locked?'rgba(255,255,255,0.04)':CB),borderRadius:13,padding:'18px 22px',cursor:'pointer',display:'flex',alignItems:'center',gap:18,opacity:locked?0.75:1,transition:'all 0.15s'}}
                onMouseEnter={e=>{if(!locked){e.currentTarget.style.background=BLU3;e.currentTarget.style.borderColor=BLUB;}}}
                onMouseLeave={e=>{e.currentTarget.style.background=locked?'rgba(255,255,255,0.015)':CA;e.currentTarget.style.borderColor=locked?'rgba(255,255,255,0.04)':CB;}}>
                <div style={{fontSize:11,fontWeight:700,color:BLU,width:26,flexShrink:0}}>{String(i+1).padStart(2,'0')}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:15,fontWeight:700,letterSpacing:'-0.01em',marginBottom:2}}>
                    {p.nombre}
                    {p.free&&!isPro&&<span style={{fontSize:10,fontWeight:700,color:BLU,background:'rgba(52,211,153,0.1)',borderRadius:6,padding:'2px 7px',marginLeft:8,letterSpacing:'0.06em'}}>GRATIS</span>}
                  </div>
                  <div style={{fontSize:12,color:T2,fontWeight:500}}>{p.subtitulo}</div>
                </div>
                {locked?<span style={{fontSize:16,flexShrink:0}}>🔒</span>:<span style={{color:'rgba(52,211,153,0.5)',fontSize:16}}>→</span>}
              </div>
            );
          })}
        </div>
      </div>
      {chatPanelEl}
    </div>
  );

  if(view==='detail'&&activePrompt) return(
    <div>
      <Nav/><ModalOverlay/>
      <div style={{maxWidth:880,margin:'0 auto',padding:'40px 20px 100px'}}>
        <div style={{maxWidth:680}}>
          {activeCol&&<div style={{display:'inline-flex',alignItems:'center',gap:6,background:'rgba(52,211,153,0.07)',border:'1px solid rgba(52,211,153,0.18)',borderRadius:100,padding:'4px 12px',fontSize:11,fontWeight:700,color:BLU,letterSpacing:'0.08em',marginBottom:16}}>{activeCol.icono} {activeCol.nombre}</div>}
          <div style={{fontSize:'clamp(40px,9vw,64px)',fontWeight:900,letterSpacing:'-0.04em',lineHeight:0.92,color:BLU,marginBottom:10}}>{activePrompt.nombre}</div>
          <div style={{fontSize:18,fontWeight:600,color:'rgba(255,255,255,0.75)',marginBottom:6}}>{activePrompt.subtitulo}</div>
          <div style={{fontSize:15,color:T2,fontStyle:'italic',marginBottom:32}}>"{activePrompt.tagline}"</div>
          <div style={{background:'rgba(52,211,153,0.03)',border:'1px solid rgba(52,211,153,0.12)',borderRadius:16,overflow:'hidden',marginBottom:16}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'13px 20px',borderBottom:'1px solid rgba(52,211,153,0.08)',background:'rgba(52,211,153,0.04)'}}>
              <span style={{fontSize:11,fontWeight:700,color:BLU,letterSpacing:'0.1em',textTransform:'uppercase'}}>Las instrucciones</span>
              <button onClick={()=>copyText(activePrompt.texto,activePrompt.nombre)} style={{display:'flex',alignItems:'center',gap:6,background:copied===activePrompt.nombre?'#4caf50':BLU,color:copied===activePrompt.nombre?'#fff':'#000',border:'none',borderRadius:8,padding:'7px 14px',fontSize:12,fontWeight:700,cursor:'pointer'}}>{copied===activePrompt.nombre?'✓ Copiadas':'⎘ Copiar instrucciones'}</button>
            </div>
            <div style={{padding:22,fontSize:14,lineHeight:1.75,color:'rgba(255,255,255,0.72)',whiteSpace:'pre-wrap'}}>{activePrompt.texto}</div>
          </div>
          {isPro ? (
            activePrompt.nombre==='AXON' ? (
            <button onClick={()=>openChat(activePrompt,activeCol?activeCol.id:null)} style={{display:'flex',alignItems:'center',gap:16,width:'100%',background:'rgba(52,211,153,0.08)',border:'2px solid rgba(52,211,153,0.35)',borderRadius:13,padding:'20px 22px',cursor:'pointer',textAlign:'left',color:'#fff'}}>
              <div style={{width:44,height:44,borderRadius:12,background:'#34D399',display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,flexShrink:0}}>⚡</div>
              <div style={{flex:1}}>
                <div style={{fontSize:16,fontWeight:800,marginBottom:3}}>Hablar con AXON</div>
                <div style={{fontSize:12,color:T2}}>Empieza aquí — te activa todos los demás agentes</div>
              </div>
              <span style={{fontSize:20,color:'#34D399'}}>&#8594;</span>
            </button>
            ) : (
            <div style={{background:'rgba(255,255,255,0.03)',border:'1px solid rgba(255,255,255,0.08)',borderRadius:13,padding:'18px 22px'}}>
              <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
                <span style={{fontSize:18}}>🔒</span>
                <div style={{fontSize:14,fontWeight:700,color:'rgba(255,255,255,0.7)'}}>Activa este agente con AXON</div>
              </div>
              <div style={{fontSize:13,color:T3,lineHeight:1.6}}>Habla primero con AXON. Él te creará el Project y activará a {activePrompt.nombre} en tu LLM con todo el contexto listo.</div>
            </div>
            )
          ) : (
            <button onClick={()=>setModal('unlock')} style={{display:'flex',alignItems:'center',gap:12,width:'100%',background:'rgba(255,255,255,0.02)',border:'1px solid rgba(255,255,255,0.07)',borderRadius:13,padding:'18px 22px',cursor:'pointer',textAlign:'left',color:T3}}>
              <span style={{fontSize:22,flexShrink:0}}>🔒</span>
              <div>
                <div style={{fontSize:15,fontWeight:700,marginBottom:3,color:'rgba(255,255,255,0.6)'}}>Usar {activePrompt.nombre} con tu IA</div>
                <div style={{fontSize:12}}>Disponible en Pro — desbloquea por 19€</div>
              </div>
            </button>
          )}
        </div>
      </div>
      {chatPanelEl}
    </div>
  );

  if(view==='tes') return(
    <div>
      <Nav/>
      <div style={{maxWidth:880,margin:'0 auto',padding:'40px 20px 100px'}}>
        <div style={{fontSize:28,fontWeight:800,letterSpacing:'-0.03em',marginBottom:6}}>Tecnología Explicada Simple</div>
        <div style={{fontSize:14,color:T2,marginBottom:40}}>Todo el contenido gratuito — en el canal que prefieras.</div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(220px,1fr))',gap:14}}>
          {[
            {icon:'🌐',name:'Web TES',sub:'tecnologiaexplicadasimple.com',url:'https://tecnologiaexplicadasimple.com',color:BLU},
            {icon:'▶️',name:'YouTube',sub:'@Tecnologia.Explicada.Simple',url:'https://www.youtube.com/@Tecnologia.Explicada.Simple',color:'#ff4444'},
            {icon:'📸',name:'Instagram',sub:'@tecnologia.explicada.simple',url:'https://www.instagram.com/tecnologia.explicada.simple',color:'#e1306c'},
            {icon:'🎵',name:'TikTok',sub:'@techexplicadasimple',url:'https://www.tiktok.com/@techexplicadasimple',color:'#69c9d0'}
          ].map(item=>(
            <a key={item.name} href={item.url} target="_blank" rel="noopener noreferrer"
              style={{background:CA,border:'1px solid '+CB,borderRadius:16,padding:24,display:'flex',flexDirection:'column',gap:12,textDecoration:'none',color:'#fff'}}
              onMouseEnter={e=>{e.currentTarget.style.background='rgba(255,255,255,0.06)';e.currentTarget.style.borderColor='rgba(255,255,255,0.14)';}}
              onMouseLeave={e=>{e.currentTarget.style.background=CA;e.currentTarget.style.borderColor=CB;}}>
              <span style={{fontSize:32}}>{item.icon}</span>
              <div>
                <div style={{fontSize:17,fontWeight:700,letterSpacing:'-0.02em',marginBottom:4}}>{item.name}</div>
                <div style={{fontSize:12,color:T3}}>{item.sub}</div>
              </div>
              <div style={{fontSize:13,color:item.color,fontWeight:600,marginTop:'auto'}}>Visitar →</div>
            </a>
          ))}
        </div>
        <div style={{marginTop:48,padding:24,background:'rgba(52,211,153,0.04)',border:'1px solid rgba(52,211,153,0.12)',borderRadius:16}}>
          <div style={{fontSize:15,fontWeight:700,marginBottom:8}}>¿Feedback sobre Agentes Brutales?</div>
          <div style={{fontSize:14,color:T2,marginBottom:16}}>Escríbenos por Instagram o deja un comentario en YouTube.</div>
          <a href="https://www.instagram.com/tecnologia.explicada.simple" target="_blank" rel="noopener noreferrer" style={{display:'inline-flex',alignItems:'center',gap:8,background:BLU,color:'#000',borderRadius:10,padding:'10px 20px',fontSize:13,fontWeight:700,textDecoration:'none'}}>Contactar por Instagram →</a>
        </div>
      </div>
    </div>
  );

  return null;
}

ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>
</body>
</html>
