const { useState, useRef, useEffect, useCallback } = React;

// ─── CONFIG ───────────────────────────────────────────────────────────────────
const IS_PRO = true;
const MSG_LIMIT = 500;
const ACENTO = '#34D399';
const G = ACENTO;
const CA = 'rgba(255,255,255,0.03)';
const CB = 'rgba(255,255,255,0.07)';
const T1 = 'rgba(255,255,255,0.88)';
const T2 = 'rgba(255,255,255,0.55)';
const T3 = 'rgba(255,255,255,0.32)';
const GBG = 'rgba(52,211,153,0.06)';
const GBD = 'rgba(52,211,153,0.18)';

function getKey() {
  var k1='sk-ant-api03-qp8DjbMxmbh2aM_0I0iR_idH';
  var k2='AEC3xX6mjydeTfvE68JfUy8S00zqZ8aNqf1LiW7SVsgPF_MyDEZ9TkTc4EHp1g-Tcv6QwAA';
  return k1+k2;
}

function clean(t) {
  return t
    .replace(/#{1,6}\s+/g,'')
    .replace(/\*\*([^*]+)\*\*/g,'$1')
    .replace(/\*([^*]+)\*/g,'$1')
    .replace(/---/g,'—')
    .replace(/\n{3,}/g,'\n\n')
    .trim();
}

function ls(k,d) {
  try { const v=localStorage.getItem(k); return v?JSON.parse(v):d; } catch(e){ return d; }
}
function lsSet(k,v) {
  try { localStorage.setItem(k,JSON.stringify(v)); } catch(e){}
}

const CATS_GASTO = ['Vivienda','Alimentación','Transporte','Salud','Educación','Telecomunicaciones','Seguros','Entretenimiento','Ropa','Restaurantes','Suscripciones','Otros'];
const CATS_INGRESO = ['Salario','Freelance','Negocio','Inversiones','Alquiler','Otros'];
const ICONOS_CAT = {Vivienda:'🏠',Alimentación:'🛒',Transporte:'🚗',Salud:'💊',Educación:'📚',Telecomunicaciones:'📱',Seguros:'🛡️',Entretenimiento:'🎬',Ropa:'👕',Restaurantes:'🍽️',Suscripciones:'📺',Salario:'💼',Freelance:'💻',Negocio:'🏪',Inversiones:'📈',Alquiler:'🏘️',Otros:'📌'};

function fmtEur(n) {
  return n.toLocaleString('es-ES',{minimumFractionDigits:0,maximumFractionDigits:0})+' €';
}
function fmtFecha(d) {
  const dias=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  const meses=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  const dt=new Date(d+'T12:00:00');
  return dias[dt.getDay()]+' '+dt.getDate()+' '+meses[dt.getMonth()];
}
function mesActual() {
  const n=new Date();
  return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0');
}
function hoy() {
  return new Date().toISOString().split('T')[0];
}

// ─── COMPONENTES BASE ─────────────────────────────────────────────────────────

function BadgeTipo({tipo}) {
  const cfg = {
    esencial:{label:'Esencial',bg:'rgba(52,211,153,0.1)',color:'#34D399'},
    calidad:{label:'Calidad de vida',bg:'rgba(96,165,250,0.1)',color:'#60A5FA'},
    capricho:{label:'Capricho',bg:'rgba(251,191,36,0.1)',color:'#FBBF24'},
  };
  const c=cfg[tipo];
  if(!c) return null;
  return <span style={{fontSize:9,fontWeight:600,padding:'2px 7px',borderRadius:20,background:c.bg,color:c.color,letterSpacing:'0.03em',whiteSpace:'nowrap'}}>{c.label}</span>;
}

function ProgressBar({pct,color=ACENTO,height=3}) {
  return (
    <div style={{height,background:'rgba(255,255,255,0.07)',borderRadius:height,overflow:'hidden',marginTop:6}}>
      <div style={{height:'100%',width:Math.min(pct,100)+'%',background:color,borderRadius:height,transition:'width 0.4s'}}/>
    </div>
  );
}

function Card({children,style={},onClick}) {
  return (
    <div onClick={onClick} style={{background:CA,border:'0.5px solid '+CB,borderRadius:14,padding:'13px 14px',marginBottom:9,...style,cursor:onClick?'pointer':'default'}}>

    </div>
  );
}

function SecLabel({children}) {
  return <div style={{fontSize:10,color:T3,letterSpacing:'0.07em',textTransform:'uppercase',margin:'13px 0 7px'}}>{children}</div>;
}

function Divider() {
  return <div style={{height:'0.5px',background:'rgba(255,255,255,0.05)',margin:'10px 0'}}/>;
}

// ─── ONBOARDING AXON ─────────────────────────────────────────────────────────

  const [step,setStep]=useState(0);

        <div style={{width:60,height:60,borderRadius:18,background:GBG,border:'0.5px solid '+GBD,display:'flex',alignItems:'center',justifyContent:'center',marginBottom:20,fontSize:28}}>⚡</div>
        <div style={{fontSize:10,color:ACENTO,letterSpacing:'0.1em',textTransform:'uppercase',marginBottom:10}}>Finanzas Brutales</div>

// ─── DASHBOARD ────────────────────────────────────────────────────────────────
function Dashboard({txs,metas,fondoSaldo,setView}) {
  const mes=mesActual();
  const txMes=txs.filter(t=>t.fecha.startsWith(mes));
  const ingresos=txMes.filter(t=>t.tipo==='ingreso').reduce((a,t)=>a+t.importe,0);
  const gastos=txMes.filter(t=>t.tipo==='gasto').reduce((a,t)=>a+t.importe,0);
  const sobra=ingresos-gastos;

  const gastoE=txMes.filter(t=>t.tipo==='gasto'&&t.tipogasto==='esencial').reduce((a,t)=>a+t.importe,0);
  const gastoC=txMes.filter(t=>t.tipo==='gasto'&&t.tipogasto==='calidad').reduce((a,t)=>a+t.importe,0);
  const gastoK=txMes.filter(t=>t.tipo==='gasto'&&t.tipogasto==='capricho').reduce((a,t)=>a+t.importe,0);

  // Base fondo: suma de gastos esencial + calidad de TODOS los meses (promedio mensual de recurrentes)
  const recurrentes=txs.filter(t=>t.tipo==='gasto'&&t.recurrente&&(t.tipogasto==='esencial'||t.tipogasto==='calidad'));
  const baseFondo=recurrentes.reduce((a,t)=>a+t.importe,0)||gastoE+gastoC;
  const f3=baseFondo*3, f6=baseFondo*6, f12=baseFondo*12;
  const pct3=f3>0?Math.round((fondoSaldo/f3)*100):0;

  const mNow=new Date().toLocaleString('es-ES',{month:'long',year:'numeric'});

  return (
    <div style={{paddingBottom:80}}>
      <Nav title={mNow.charAt(0).toUpperCase()+mNow.slice(1)} sub="Tu resumen financiero"
        right={<div style={{width:32,height:32,borderRadius:'50%',background:GBG,border:'0.5px solid '+GBD,display:'flex',alignItems:'center',justifyContent:'center',color:ACENTO,fontSize:13,fontWeight:700}}>C</div>}/>
      <div style={{padding:'0 14px'}}>
        {/* Balance mes */}
        <Card style={{borderColor:sobra>=0?GBD:'rgba(248,113,113,0.2)',marginTop:12}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:12}}>
            <div>
              <div style={{fontSize:10,color:T3,marginBottom:3}}>Sobra este mes</div>
              <div style={{fontSize:28,fontWeight:800,color:sobra>=0?ACENTO:'#F87171',letterSpacing:'-0.03em'}}>{sobra>=0?'+':''}{fmtEur(sobra)}</div>
            </div>
            <button onClick={()=>setView('balance')} style={{background:CA,border:'0.5px solid '+CB,borderRadius:8,padding:'5px 10px',fontSize:11,color:T2,cursor:'pointer',fontFamily:'Inter,sans-serif'}}>Ver →</button>
          </div>
          <div style={{display:'flex',gap:0}}>
            <div style={{flex:1,textAlign:'center'}}>
              <div style={{fontSize:10,color:T3,marginBottom:2}}>Ingresos</div>
              <div style={{fontSize:15,fontWeight:700,color:ACENTO}}>{fmtEur(ingresos)}</div>
            </div>
            <div style={{width:'0.5px',background:'rgba(255,255,255,0.06)'}}/>
            <div style={{flex:1,textAlign:'center'}}>
              <div style={{fontSize:10,color:T3,marginBottom:2}}>Gastos</div>
              <div style={{fontSize:15,fontWeight:700,color:'#F87171'}}>{fmtEur(gastos)}</div>
            </div>
          </div>
        </Card>

        <SecLabel>Plan financiero</SecLabel>

        {/* Fondo emergencia */}
        <Card onClick={()=>setView('fondo')} style={{cursor:'pointer'}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:7}}>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <span style={{fontSize:16}}>🛡️</span>
              <span style={{fontSize:13,fontWeight:600,color:'#fff'}}>Fondo de emergencia</span>
            </div>
            <span style={{fontSize:11,color:ACENTO,fontWeight:700}}>{pct3}%</span>
          </div>
          <ProgressBar pct={pct3}/>
          <div style={{display:'flex',justifyContent:'space-between',marginTop:5}}>
            <span style={{fontSize:10,color:T3}}>{fmtEur(fondoSaldo)} / {fmtEur(f3)} mínimo</span>
            {pct3>=100&&<span style={{fontSize:10,color:ACENTO}}>✓ Mínimo alcanzado</span>}
          </div>
        </Card>

        {/* Metas */}
        {metas.length>0&&metas.slice(0,2).map(m=>{
          const pct=m.meta>0?Math.round((m.actual/m.meta)*100):0;
          return (
            <Card key={m.id} onClick={()=>setView('metas')} style={{cursor:'pointer'}}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:7}}>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <span style={{fontSize:16}}>{m.icono||'🎯'}</span>
                  <span style={{fontSize:13,fontWeight:600,color:'#fff'}}>{m.nombre}</span>
                </div>
                <span style={{fontSize:11,color:'#60A5FA',fontWeight:700}}>{pct}%</span>
              </div>
              <ProgressBar pct={pct} color="#60A5FA"/>
              <div style={{display:'flex',justifyContent:'space-between',marginTop:5}}>
                <span style={{fontSize:10,color:T3}}>{fmtEur(m.actual)} / {fmtEur(m.meta)}</span>
                {m.fecha&&<span style={{fontSize:10,color:T3}}>{m.fecha}</span>}
              </div>
            </Card>
          );
        })}

        {metas.length===0&&(
          <button onClick={()=>setView('metas')} style={{width:'100%',padding:'12px 14px',background:CA,border:'0.5px dashed rgba(255,255,255,0.08)',borderRadius:13,color:T3,fontSize:12,cursor:'pointer',fontFamily:'Inter,sans-serif',marginBottom:9,textAlign:'center'}}>
            + Añadir primera meta de ahorro
          </button>
        )}

        <SecLabel>Gastos por tipo este mes</SecLabel>
        {gastos>0?(
          <Card>
            {[{label:'Esencial',v:gastoE,c:ACENTO},{label:'Calidad de vida',v:gastoC,c:'#60A5FA'},{label:'Capricho',v:gastoK,c:'#FBBF24'}].map(({label,v,c})=>(
              <div key={label} style={{marginBottom:label==='Capricho'?0:10}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                  <span style={{fontSize:11,color:T2}}>{label}</span>
                  <span style={{fontSize:12,fontWeight:600,color:'#fff'}}>{fmtEur(v)}</span>
                </div>
                <ProgressBar pct={gastos>0?Math.round((v/gastos)*100):0} color={c}/>
              </div>
            ))}
          </Card>
        ):(
          <div style={{padding:'16px 14px',background:CA,border:'0.5px solid '+CB,borderRadius:13,marginBottom:9,textAlign:'center'}}>
            <div style={{fontSize:12,color:T3,marginBottom:8}}>Sin gastos registrados este mes</div>
            <button onClick={()=>setView('balance')} style={{fontSize:12,color:ACENTO,background:'none',border:'none',cursor:'pointer',fontFamily:'Inter,sans-serif'}}>Registrar primer gasto →</button>
          </div>
        )}

        {/* CTA FLUJO */}
        <div onClick={()=>setView('flujo')} style={{display:'flex',alignItems:'center',gap:12,padding:'12px 14px',background:GBG,border:'0.5px solid '+GBD,borderRadius:14,cursor:'pointer',marginTop:4}}>
          <div style={{width:36,height:36,borderRadius:10,background:ACENTO,display:'flex',alignItems:'center',justifyContent:'center',color:'#000',fontSize:18,flexShrink:0}}>⚡</div>
          <div style={{flex:1}}>
            <div style={{fontSize:13,fontWeight:700,color:'#fff'}}>Hablar con FLUJO</div>
            <div style={{fontSize:10,color:T3}}>Tu asesor financiero personal</div>
          </div>
          <span style={{fontSize:16,color:'rgba(52,211,153,0.4)'}}>→</span>
        </div>
      </div>
    </div>
  );
}

// ─── BALANCE ──────────────────────────────────────────────────────────────────
function Balance({txs,setTxs,setView}) {
  const [filtro,setFiltro]=useState('mes');
  const [showReg,setShowReg]=useState(false);
  const [editTx,setEditTx]=useState(null);

  const mes=mesActual();
  const txFiltradas=filtro==='mes'
    ? txs.filter(t=>t.fecha.startsWith(mes))
    : txs;

  const ingresos=txFiltradas.filter(t=>t.tipo==='ingreso').reduce((a,t)=>a+t.importe,0);
  const gastos=txFiltradas.filter(t=>t.tipo==='gasto').reduce((a,t)=>a+t.importe,0);
  const sobra=ingresos-gastos;

  function deleteTx(id) {
    setTxs(prev=>{const n=prev.filter(t=>t.id!==id);lsSet('fb_txs',n);return n;});
  }

  // agrupar por fecha
  const grouped={};
  [...txFiltradas].sort((a,b)=>b.fecha.localeCompare(a.fecha)).forEach(t=>{
    if(!grouped[t.fecha]) grouped[t.fecha]=[];
    grouped[t.fecha].push(t);
  });

  return (
    <div style={{paddingBottom:80}}>
      <Nav title="Balance" sub={filtro==='mes'?'Este mes':'Todo el historial'}
        right={
          <div style={{display:'flex',gap:5}}>
            {['mes','todo'].map(f=>(
              <button key={f} onClick={()=>setFiltro(f)} style={{background:filtro===f?'rgba(255,255,255,0.08)':'none',border:'none',color:filtro===f?'#fff':T3,borderRadius:7,padding:'3px 9px',fontSize:10,cursor:'pointer',fontFamily:'Inter,sans-serif'}}>
                {f==='mes'?'Mes':'Todo'}
              </button>
            ))}
          </div>
        }/>

            <div style={{width:'0.5px',background:'rgba(255,255,255,0.06)'}}/>
            <div><div style={{fontSize:10,color:T3,marginBottom:2}}>Gastos</div><div style={{fontSize:16,fontWeight:700,color:'#F87171'}}>{fmtEur(gastos)}</div></div>
            <div style={{width:'0.5px',background:'rgba(255,255,255,0.06)'}}/>
            <div><div style={{fontSize:10,color:T3,marginBottom:2}}>Sobra</div><div style={{fontSize:16,fontWeight:700,color:sobra>=0?ACENTO:'#F87171'}}>{sobra>=0?'+':''}{fmtEur(sobra)}</div></div>
          </div>

            <div style={{fontSize:14,marginBottom:6}}>Sin transacciones</div>
            <div style={{fontSize:12,marginBottom:16}}>Registra tu primer ingreso o gasto</div>

                    {ICONOS_CAT[t.categoria]||'📌'}

      {/* FAB */}
      <button onClick={()=>setShowReg(true)} style={{position:'fixed',bottom:70,right:16,width:48,height:48,borderRadius:15,background:ACENTO,border:'none',color:'#000',fontSize:26,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',zIndex:90,boxShadow:'0 4px 20px rgba(52,211,153,0.3)'}}>+</button>

// ─── REGISTRO MODAL ───────────────────────────────────────────────────────────
function RegistroModal({onClose,onSave,inicial=null}) {
  const [tipoTx,setTipoTx]=useState(inicial?.tipo||'gasto');
  const [nombre,setNombre]=useState(inicial?.nombre||'');
  const [categoria,setCategoria]=useState(inicial?.categoria||'');
  const [importe,setImporte]=useState(inicial?.importe?String(inicial.importe):'');
  const [fecha,setFecha]=useState(inicial?.fecha||hoy());
  const [recurrente,setRecurrente]=useState(inicial?.recurrente||false);
  const [tipogasto,setTipogasto]=useState(inicial?.tipogasto||'');
  const [err,setErr]=useState('');

  function guardar() {
    if(!nombre.trim()){setErr('Añade un nombre');return;}
    if(!importe||isNaN(parseFloat(importe))||parseFloat(importe)<=0){setErr('Importe inválido');return;}
    if(!categoria){setErr('Selecciona una categoría');return;}
    if(tipoTx==='gasto'&&!tipogasto){setErr('Elige el tipo de gasto');return;}
    onSave({id:Date.now().toString(),tipo:tipoTx,nombre:nombre.trim(),categoria,importe:parseFloat(importe),fecha,recurrente,tipogasto:tipoTx==='gasto'?tipogasto:null});
  }

  const cats=tipoTx==='gasto'?CATS_GASTO:CATS_INGRESO;

  return (
    <div style={{position:'fixed',inset:0,zIndex:200,display:'flex',flexDirection:'column'}}>
      <div onClick={onClose} style={{flex:1,background:'rgba(0,0,0,0.7)',backdropFilter:'blur(4px)'}}/>
      <div style={{background:'#0a0a0a',border:'0.5px solid rgba(255,255,255,0.08)',borderRadius:'20px 20px 0 0',padding:'16px 16px 32px',animation:'slideUp 0.25s ease',maxHeight:'85vh',overflowY:'auto'}}>
        {/* Header */}
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
          <button onClick={onClose} style={{background:'none',border:'none',color:T2,fontSize:13,cursor:'pointer',fontFamily:'Inter,sans-serif'}}>Cancelar</button>
          <span style={{fontSize:14,fontWeight:700,color:'#fff'}}>Nueva transacción</span>
          <button onClick={guardar} style={{background:'none',border:'none',color:ACENTO,fontSize:13,fontWeight:700,cursor:'pointer',fontFamily:'Inter,sans-serif'}}>Guardar</button>
        </div>

        {/* Tipo tx */}
        <div style={{display:'flex',gap:6,marginBottom:14}}>
          {['gasto','ingreso'].map(t=>(
            <button key={t} onClick={()=>{setTipoTx(t);setCategoria('');setTipogasto('');}} style={{flex:1,padding:9,borderRadius:10,background:tipoTx===t?(t==='gasto'?'rgba(248,113,113,0.1)':GBG):'none',border:'0.5px solid '+(tipoTx===t?(t==='gasto'?'rgba(248,113,113,0.3)':GBD):'rgba(255,255,255,0.07)'),color:tipoTx===t?(t==='gasto'?'#F87171':ACENTO):T3,fontSize:13,fontWeight:600,cursor:'pointer',fontFamily:'Inter,sans-serif',textTransform:'capitalize'}}>
              {t}
            </button>
          ))}
        </div>

        {/* Importe grande */}
        <div style={{textAlign:'center',marginBottom:16}}>
          <input type="number" value={importe} onChange={e=>setImporte(e.target.value)} placeholder="0"
            style={{fontSize:34,fontWeight:800,color:'#fff',background:'none',border:'none',outline:'none',textAlign:'center',width:'100%',letterSpacing:'-0.03em'}}/>
          <div style={{fontSize:12,color:T3,marginTop:-4}}>€</div>
        </div>

        {/* Campos */}
        <div style={{background:'rgba(255,255,255,0.03)',borderRadius:13,overflow:'hidden',border:'0.5px solid rgba(255,255,255,0.06)',marginBottom:10}}>
          <div style={{display:'flex',alignItems:'center',gap:12,padding:'11px 13px',borderBottom:'0.5px solid rgba(255,255,255,0.05)'}}>
            <span style={{fontSize:15}}>📝</span>
            <input value={nombre} onChange={e=>setNombre(e.target.value)} placeholder="Nombre (ej. Alquiler, Salario...)"
              style={{flex:1,background:'none',border:'none',outline:'none',color:'#fff',fontSize:13,fontFamily:'Inter,sans-serif'}}/>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:12,padding:'11px 13px',borderBottom:'0.5px solid rgba(255,255,255,0.05)'}}>
            <span style={{fontSize:15}}>🏷️</span>
            <select value={categoria} onChange={e=>setCategoria(e.target.value)}
              style={{flex:1,background:'none',border:'none',outline:'none',color:categoria?'#fff':T3,fontSize:13,fontFamily:'Inter,sans-serif',cursor:'pointer'}}>
              <option value="" style={{background:'#111'}}>Categoría</option>
              {cats.map(c=><option key={c} value={c} style={{background:'#111'}}>{c}</option>)}
            </select>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:12,padding:'11px 13px',borderBottom:'0.5px solid rgba(255,255,255,0.05)'}}>
            <span style={{fontSize:15}}>📅</span>
            <input type="date" value={fecha} onChange={e=>setFecha(e.target.value)}
              style={{flex:1,background:'none',border:'none',outline:'none',color:'#fff',fontSize:13,fontFamily:'Inter,sans-serif',cursor:'pointer'}}/>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:12,padding:'11px 13px'}}>
            <span style={{fontSize:15}}>↻</span>
            <span style={{fontSize:13,color:T2,flex:1}}>¿Se repite cada mes?</span>
            <button onClick={()=>setRecurrente(!recurrente)} style={{width:36,height:20,borderRadius:10,background:recurrente?ACENTO:'rgba(255,255,255,0.1)',border:'none',cursor:'pointer',position:'relative',transition:'background 0.2s'}}>
              <div style={{width:16,height:16,borderRadius:'50%',background:'#fff',position:'absolute',top:2,left:recurrente?18:2,transition:'left 0.2s'}}/>
            </button>
          </div>
        </div>

        {/* Tipo gasto — la decisión consciente */}
        {tipoTx==='gasto'&&(
          <div style={{background:'rgba(255,255,255,0.02)',border:'0.5px solid rgba(255,255,255,0.06)',borderRadius:12,padding:'11px 13px',marginBottom:10}}>
            <div style={{fontSize:10,color:T3,marginBottom:8,letterSpacing:'0.05em'}}>TIPO DE GASTO — ¿qué es para ti?</div>
            <div style={{display:'flex',gap:6}}>
              {[
                {id:'esencial',label:'Esencial',hint:'Sin esto, la vida se para',ac:ACENTO},
                {id:'calidad',label:'Calidad de vida',hint:'Sin esto, la vida es gris',ac:'#60A5FA'},
                {id:'capricho',label:'Capricho',hint:'Puedo vivir sin ello',ac:'#FBBF24'},
              ].map(({id,label,hint,ac})=>(
                <button key={id} onClick={()=>setTipogasto(id)} style={{flex:1,padding:'8px 4px',borderRadius:9,background:tipogasto===id?`rgba(${id==='esencial'?'52,211,153':id==='calidad'?'96,165,250':'251,191,36'},0.1)`:'none',border:`0.5px solid ${tipogasto===id?ac:'rgba(255,255,255,0.07)'}`,color:tipogasto===id?ac:T3,fontSize:10,fontWeight:tipogasto===id?700:400,cursor:'pointer',fontFamily:'Inter,sans-serif',lineHeight:1.3,transition:'all 0.15s'}}>
                  {label}
                </button>
              ))}
            </div>
            {tipogasto&&(
              <div style={{fontSize:10,color:T3,marginTop:6,textAlign:'center'}}>
                {tipogasto==='esencial'&&'Entra en tu fondo de emergencia ✓'}
                {tipogasto==='calidad'&&'Entra en tu fondo de emergencia ✓'}
                {tipogasto==='capricho'&&'No entra en el fondo — palanca de ahorro potencial'}
              </div>
            )}
          </div>
        )}

        {err&&<div style={{fontSize:12,color:'#F87171',textAlign:'center',marginBottom:8}}>{err}</div>}

        <button onClick={guardar} style={{width:'100%',padding:13,borderRadius:12,background:ACENTO,border:'none',color:'#000',fontSize:14,fontWeight:800,cursor:'pointer',fontFamily:'Inter,sans-serif'}}>
          Guardar transacción
        </button>
      </div>
    </div>
  );
}

// ─── FONDO DE EMERGENCIA ──────────────────────────────────────────────────────
function Fondo({txs,fondoSaldo,setFondoSaldo}) {
  const [editSaldo,setEditSaldo]=useState(false);
  const [newSaldo,setNewSaldo]=useState(String(fondoSaldo));

  const recurrentes=txs.filter(t=>t.tipo==='gasto'&&t.recurrente&&(t.tipogasto==='esencial'||t.tipogasto==='calidad'));
  const baseRec=recurrentes.reduce((a,t)=>a+t.importe,0);
  const mes=mesActual();
  const txMes=txs.filter(t=>t.fecha.startsWith(mes));
  const baseMes=txMes.filter(t=>t.tipo==='gasto'&&(t.tipogasto==='esencial'||t.tipogasto==='calidad')).reduce((a,t)=>a+t.importe,0);
  const base=baseRec||baseMes;

  const f3=base*3, f6=base*6, f12=base*12;
  const p3=f3>0?Math.min(Math.round((fondoSaldo/f3)*100),999):0;
  const p6=f6>0?Math.min(Math.round((fondoSaldo/f6)*100),999):0;
  const p12=f12>0?Math.min(Math.round((fondoSaldo/f12)*100),999):0;

  const gastoE=txMes.filter(t=>t.tipo==='gasto'&&t.tipogasto==='esencial').reduce((a,t)=>a+t.importe,0);
  const gastoC=txMes.filter(t=>t.tipo==='gasto'&&t.tipogasto==='calidad').reduce((a,t)=>a+t.importe,0);

  function saveSaldo() {
    const v=parseFloat(newSaldo);
    if(!isNaN(v)&&v>=0){setFondoSaldo(v);lsSet('fb_fondo',v);}
    setEditSaldo(false);
  }

  const niveles=[
    {label:'Mínimo',n:'3 meses',meta:f3,pct:p3,color:'#FBBF24',dot:'#FBBF24'},
    {label:'Deseable',n:'6 meses',meta:f6,pct:p6,color:ACENTO,dot:'rgba(52,211,153,0.5)'},
    {label:'Ideal',n:'12 meses',meta:f12,pct:p12,color:'rgba(52,211,153,0.25)',dot:'rgba(255,255,255,0.15)'},
  ];

  return (
    <div style={{paddingBottom:100}}>
      <Nav title="Fondo de emergencia" sub={base>0?`Base: ${fmtEur(base)}/mes`:'Registra gastos para calcular'}/>
      <div style={{padding:'12px 14px 0'}}>
        {/* Saldo actual */}
        <Card style={{borderColor:GBD,textAlign:'center',marginBottom:12}}>
          <div style={{fontSize:10,color:T3,marginBottom:4}}>Saldo actual</div>
          {editSaldo?(
            <div style={{display:'flex',gap:8,alignItems:'center',justifyContent:'center',margin:'4px 0'}}>
              <input type="number" value={newSaldo} onChange={e=>setNewSaldo(e.target.value)} autoFocus
                style={{fontSize:24,fontWeight:800,color:'#fff',background:'none',border:'none',outline:'none',textAlign:'center',width:140,fontFamily:'Inter,sans-serif'}}/>
              <span style={{fontSize:16,color:T2}}>€</span>
            </div>
          ):(
            <div style={{fontSize:32,fontWeight:800,color:ACENTO,letterSpacing:'-0.03em',marginBottom:4}}>{fmtEur(fondoSaldo)}</div>
          )}
          <button onClick={()=>editSaldo?saveSaldo():setEditSaldo(true)} style={{fontSize:11,color:editSaldo?ACENTO:T3,background:'none',border:'none',cursor:'pointer',fontFamily:'Inter,sans-serif'}}>
            {editSaldo?'Guardar saldo':'Actualizar saldo →'}
          </button>
        </Card>

        <SecLabel>Tus tres niveles</SecLabel>

        {base===0?(
          <div style={{padding:'20px 14px',background:CA,border:'0.5px solid '+CB,borderRadius:13,textAlign:'center',marginBottom:9}}>
            <div style={{fontSize:12,color:T3,lineHeight:1.6}}>Registra tus gastos fijos marcándolos como <strong style={{color:'#fff'}}>Esencial</strong> o <strong style={{color:'#fff'}}>Calidad de vida</strong> para calcular tu fondo automáticamente.</div>
          </div>
        ):(
          niveles.map((nv,i)=>(
            <div key={nv.label} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 0',borderBottom:i<2?'0.5px solid rgba(255,255,255,0.04)':'none'}}>
              <div style={{width:8,height:8,borderRadius:'50%',background:nv.dot,flexShrink:0}}/>
              <div style={{flex:1}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                  <span style={{fontSize:12,fontWeight:600,color:i===0?'#fff':i===1?'rgba(255,255,255,0.55)':'rgba(255,255,255,0.28)'}}>{nv.label} · {nv.n}</span>
                  <span style={{fontSize:12,fontWeight:600,color:i===0?'#fff':i===1?'rgba(255,255,255,0.55)':'rgba(255,255,255,0.28)'}}>{fmtEur(nv.meta)}</span>
                </div>
                <ProgressBar pct={nv.pct} color={nv.color} height={3}/>
                <div style={{display:'flex',justifyContent:'space-between',marginTop:3}}>
                  <span style={{fontSize:10,color:T3}}>{nv.pct}% · faltan {fmtEur(Math.max(0,nv.meta-fondoSaldo))}</span>
                  {nv.pct>=100&&<span style={{fontSize:10,color:ACENTO}}>✓ Alcanzado</span>}
                </div>
              </div>
            </div>
          ))
        )}

        <Divider/>
        <SecLabel>¿Qué cubre tu base?</SecLabel>
        <Card style={{background:GBG,borderColor:GBD}}>
          {[{label:'Gastos esenciales',v:gastoE},{label:'Calidad de vida',v:gastoC}].map(({label,v})=>(
            <div key={label} style={{display:'flex',justifyContent:'space-between',padding:'5px 0',borderBottom:'0.5px solid rgba(255,255,255,0.05)'}}>
              <span style={{fontSize:12,color:T2}}>{label}</span>
              <span style={{fontSize:12,fontWeight:600,color:'#fff'}}>{fmtEur(v)}/mes</span>
            </div>
          ))}
          <div style={{display:'flex',justifyContent:'space-between',padding:'5px 0'}}>
            <span style={{fontSize:12,color:ACENTO,fontWeight:600}}>Total base</span>
            <span style={{fontSize:12,fontWeight:700,color:ACENTO}}>{fmtEur(gastoE+gastoC)}/mes</span>
          </div>
        </Card>

        <div style={{marginTop:10,padding:'11px 13px',background:'rgba(251,191,36,0.04)',border:'0.5px solid rgba(251,191,36,0.12)',borderRadius:12}}>
          <div style={{fontSize:11,color:'rgba(251,191,36,0.8)',lineHeight:1.6}}>💡 <strong>Recuerda:</strong> El fondo de emergencia no es ahorro — es infraestructura. No se toca. Sin él, no se invierte.</div>
        </div>
      </div>
    </div>
  );
}

// ─── METAS ────────────────────────────────────────────────────────────────────
function Metas({metas,setMetas}) {
  const [showForm,setShowForm]=useState(false);
  const [nombre,setNombre]=useState('');
  const [icono,setIcono]=useState('🎯');
  const [meta,setMeta]=useState('');
  const [actual,setActual]=useState('');
  const [fecha,setFecha]=useState('');
  const [editId,setEditId]=useState(null);

  const ICONOS=['🎯','✈️','💻','🏠','🚗','📚','💍','🏋️','🎸','🌍','🏖️','🎓'];

  function guardarMeta() {
    if(!nombre.trim()||!meta) return;
    const m={id:editId||Date.now().toString(),nombre:nombre.trim(),icono,meta:parseFloat(meta),actual:parseFloat(actual)||0,fecha};
    if(editId){
      setMetas(prev=>{const n=prev.map(x=>x.id===editId?m:x);lsSet('fb_metas',n);return n;});
    } else {
      setMetas(prev=>{const n=[...prev,m];lsSet('fb_metas',n);return n;});
    }
    setShowForm(false);setNombre('');setMeta('');setActual('');setFecha('');setIcono('🎯');setEditId(null);
  }

  function deleteMeta(id) {
    setMetas(prev=>{const n=prev.filter(m=>m.id!==id);lsSet('fb_metas',n);return n;});
  }

  function aportarMeta(id,importe) {
    setMetas(prev=>{const n=prev.map(m=>m.id===id?{...m,actual:Math.min(m.actual+importe,m.meta)}:m);lsSet('fb_metas',n);return n;});
  }

  return (
    <div style={{paddingBottom:80}}>
      <Nav title="Metas de ahorro" sub={`${metas.length} meta${metas.length!==1?'s':''} activa${metas.length!==1?'s':''}`}
        right={<button onClick={()=>setShowForm(true)} style={{background:GBG,border:'0.5px solid '+GBD,color:ACENTO,borderRadius:9,padding:'5px 11px',fontSize:11,fontWeight:700,cursor:'pointer',fontFamily:'Inter,sans-serif'}}>+ Nueva</button>}/>
      <div style={{padding:'12px 14px 0'}}>
        {metas.length===0&&!showForm&&(
          <div style={{textAlign:'center',padding:'48px 0 32px'}}>
            <div style={{fontSize:36,marginBottom:12}}>🎯</div>
            <div style={{fontSize:15,color:'#fff',fontWeight:600,marginBottom:6}}>Sin metas todavía</div>
            <div style={{fontSize:13,color:T2,marginBottom:20,lineHeight:1.6}}>Crea una meta con nombre, importe y fecha. El ahorro con nombre y fecha es 10x más efectivo.</div>
            <button onClick={()=>setShowForm(true)} style={{padding:'11px 24px',borderRadius:11,background:ACENTO,border:'none',color:'#000',fontSize:13,fontWeight:700,cursor:'pointer',fontFamily:'Inter,sans-serif'}}>Crear primera meta</button>
          </div>
        )}

        {metas.map(m=>{
          const pct=m.meta>0?Math.min(Math.round((m.actual/m.meta)*100),100):0;
          const faltan=Math.max(0,m.meta-m.actual);
          return (
            <Card key={m.id}>
              <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:8}}>
                <div style={{display:'flex',alignItems:'center',gap:10}}>
                  <div style={{width:36,height:36,borderRadius:10,background:'rgba(96,165,250,0.08)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}}>{m.icono}</div>
                  <div>
                    <div style={{fontSize:14,fontWeight:700,color:'#fff'}}>{m.nombre}</div>
                    {m.fecha&&<div style={{fontSize:10,color:T3}}>{m.fecha}</div>}
                  </div>
                </div>
                <button onClick={()=>deleteMeta(m.id)} style={{fontSize:10,color:T3,background:'none',border:'none',cursor:'pointer',fontFamily:'Inter,sans-serif'}}>✕</button>
              </div>
              <ProgressBar pct={pct} color="#60A5FA" height={4}/>
              <div style={{display:'flex',justifyContent:'space-between',marginTop:6,marginBottom:10}}>
                <span style={{fontSize:11,color:T3}}>{fmtEur(m.actual)} / {fmtEur(m.meta)}</span>
                <span style={{fontSize:11,color:'#60A5FA',fontWeight:600}}>{pct}%</span>
              </div>
              {pct<100&&(
                <div style={{display:'flex',gap:6}}>
                  {[50,100,200].map(cant=>(
                    <button key={cant} onClick={()=>aportarMeta(m.id,cant)} style={{flex:1,padding:'7px 4px',borderRadius:8,background:'rgba(96,165,250,0.06)',border:'0.5px solid rgba(96,165,250,0.15)',color:'#60A5FA',fontSize:11,fontWeight:600,cursor:'pointer',fontFamily:'Inter,sans-serif'}}>
                      +{cant}€
                    </button>
                  ))}
                  <button onClick={()=>{const v=prompt('¿Cuánto añadir?');if(v&&!isNaN(parseFloat(v)))aportarMeta(m.id,parseFloat(v));}} style={{flex:1,padding:'7px 4px',borderRadius:8,background:'rgba(96,165,250,0.06)',border:'0.5px solid rgba(96,165,250,0.15)',color:'#60A5FA',fontSize:11,fontWeight:600,cursor:'pointer',fontFamily:'Inter,sans-serif'}}>otro</button>
                </div>
              )}
              {pct>=100&&<div style={{textAlign:'center',fontSize:12,color:ACENTO,fontWeight:700}}>🎉 Meta alcanzada</div>}
            </Card>
          );
        })}

        {showForm&&(
          <div style={{background:'rgba(10,10,10,0.98)',border:'0.5px solid rgba(255,255,255,0.1)',borderRadius:16,padding:16,marginBottom:9}}>
            <div style={{fontSize:13,fontWeight:700,color:'#fff',marginBottom:12}}>Nueva meta</div>
            <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:10}}>
              {ICONOS.map(ic=>(
                <button key={ic} onClick={()=>setIcono(ic)} style={{width:34,height:34,borderRadius:8,background:icono===ic?GBG:'rgba(255,255,255,0.04)',border:`0.5px solid ${icono===ic?GBD:'rgba(255,255,255,0.06)'}`,fontSize:18,cursor:'pointer'}}>
                  {ic}
                </button>
              ))}
            </div>
            <input value={nombre} onChange={e=>setNombre(e.target.value)} placeholder="Nombre de la meta"
              style={{width:'100%',background:'rgba(255,255,255,0.04)',border:'0.5px solid rgba(255,255,255,0.08)',borderRadius:9,padding:'10px 12px',color:'#fff',fontSize:13,marginBottom:8,fontFamily:'Inter,sans-serif'}}/>
            <div style={{display:'flex',gap:8,marginBottom:8}}>
              <input type="number" value={meta} onChange={e=>setMeta(e.target.value)} placeholder="Meta total (€)"
                style={{flex:1,background:'rgba(255,255,255,0.04)',border:'0.5px solid rgba(255,255,255,0.08)',borderRadius:9,padding:'10px 12px',color:'#fff',fontSize:13,fontFamily:'Inter,sans-serif'}}/>
              <input type="number" value={actual} onChange={e=>setActual(e.target.value)} placeholder="Ya tengo (€)"
                style={{flex:1,background:'rgba(255,255,255,0.04)',border:'0.5px solid rgba(255,255,255,0.08)',borderRadius:9,padding:'10px 12px',color:'#fff',fontSize:13,fontFamily:'Inter,sans-serif'}}/>
            </div>
            <input value={fecha} onChange={e=>setFecha(e.target.value)} placeholder="Fecha objetivo (ej. dic 2026)"
              style={{width:'100%',background:'rgba(255,255,255,0.04)',border:'0.5px solid rgba(255,255,255,0.08)',borderRadius:9,padding:'10px 12px',color:'#fff',fontSize:13,marginBottom:10,fontFamily:'Inter,sans-serif'}}/>
            <div style={{display:'flex',gap:8}}>
              <button onClick={()=>setShowForm(false)} style={{flex:1,padding:10,borderRadius:9,background:'rgba(255,255,255,0.04)',border:'0.5px solid rgba(255,255,255,0.08)',color:T2,fontSize:12,cursor:'pointer',fontFamily:'Inter,sans-serif'}}>Cancelar</button>
              <button onClick={guardarMeta} style={{flex:2,padding:10,borderRadius:9,background:ACENTO,border:'none',color:'#000',fontSize:13,fontWeight:700,cursor:'pointer',fontFamily:'Inter,sans-serif'}}>Guardar meta</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── FLUJO CHAT ───────────────────────────────────────────────────────────────
function FlujoChat({txs,metas,fondoSaldo,msgCount,setMsgCount,chatMsgs,setChatMsgs,setView}) {
  const [input,setInput]=useState('');
  const [loading,setLoading]=useState(false);
  const [chatH,setChatH]=useState(window.innerHeight);
  const msgsEnd=useRef(null);
  const inputRef=useRef(null);

  // VisualViewport API — mismo patrón que WhatsApp/Telegram
  useEffect(()=>{
    function onResize(){
      const vv=window.visualViewport;
      if(vv) setChatH(vv.height);
    }
    const vv=window.visualViewport;
    if(vv){vv.addEventListener('resize',onResize);vv.addEventListener('scroll',onResize);}
    else window.addEventListener('resize',onResize);
    return ()=>{
      if(vv){vv.removeEventListener('resize',onResize);vv.removeEventListener('scroll',onResize);}
      else window.removeEventListener('resize',onResize);
    };
  },[]);

  useEffect(()=>{
    msgsEnd.current&&msgsEnd.current.scrollIntoView({behavior:'smooth'});
  },[chatMsgs,loading]);

  // Construir contexto financiero para FLUJO
  function buildContext() {
    const mes=mesActual();
    const txMes=txs.filter(t=>t.fecha.startsWith(mes));
    const ingresos=txMes.filter(t=>t.tipo==='ingreso').reduce((a,t)=>a+t.importe,0);
    const gastos=txMes.filter(t=>t.tipo==='gasto').reduce((a,t)=>a+t.importe,0);
    const gastoE=txMes.filter(t=>t.tipo==='gasto'&&t.tipogasto==='esencial').reduce((a,t)=>a+t.importe,0);
    const gastoC=txMes.filter(t=>t.tipo==='gasto'&&t.tipogasto==='calidad').reduce((a,t)=>a+t.importe,0);
    const gastoK=txMes.filter(t=>t.tipo==='gasto'&&t.tipogasto==='capricho').reduce((a,t)=>a+t.importe,0);
    const recurrentes=txs.filter(t=>t.tipo==='gasto'&&t.recurrente);
    const baseFondo=(txs.filter(t=>t.tipo==='gasto'&&t.recurrente&&(t.tipogasto==='esencial'||t.tipogasto==='calidad')).reduce((a,t)=>a+t.importe,0))||(gastoE+gastoC);
    const f3=baseFondo*3;
    const pctFondo=f3>0?Math.round((fondoSaldo/f3)*100):0;

    let ctx=`[CONTEXTO FINANCIERO DEL USUARIO — ${new Date().toLocaleDateString('es-ES',{month:'long',year:'numeric'})}]\n`;
    ctx+=`Ingresos este mes: ${fmtEur(ingresos)}\n`;
    ctx+=`Gastos este mes: ${fmtEur(gastos)} (sobra: ${fmtEur(ingresos-gastos)})\n`;
    ctx+=`  - Esenciales: ${fmtEur(gastoE)}\n`;
    ctx+=`  - Calidad de vida: ${fmtEur(gastoC)}\n`;
    ctx+=`  - Caprichos: ${fmtEur(gastoK)}\n`;
    if(recurrentes.length>0){
      ctx+=`Gastos fijos recurrentes: ${recurrentes.slice(0,5).map(t=>`${t.nombre} ${fmtEur(t.importe)}`).join(', ')}\n`;
    }
    ctx+=`Fondo de emergencia: ${fmtEur(fondoSaldo)} (${pctFondo}% del mínimo de 3 meses = ${fmtEur(f3)})\n`;
    if(metas.length>0){
      ctx+=`Metas de ahorro activas:\n`;
      metas.forEach(m=>{
        const pct=m.meta>0?Math.round((m.actual/m.meta)*100):0;
        ctx+=`  - ${m.nombre}: ${fmtEur(m.actual)} / ${fmtEur(m.meta)} (${pct}%)${m.fecha?` · ${m.fecha}`:''}\n`;
      });
    }
    if(ingresos===0&&gastos===0){
      ctx+=`IMPORTANTE: El usuario aún no ha registrado datos. Anímate a pedirle que empiece por sus ingresos.\n`;
    }
    if(msgCount>450){
      ctx+=`\nAVISO: Quedan ${MSG_LIMIT-msgCount} mensajes disponibles en este plan. Si se agotan, recuérdame cómo recargar o migrar a mi propio LLM.\n`;
    }
    return ctx;
  }

  const SYSTEM_FLUJO=`Eres FLUJO, el asesor financiero de Finanzas Brutales. Eres directo, estratégico, sin rodeos y profundamente humano. Tu trabajo no es solo dar información — es acompañar al usuario hacia la claridad financiera y ayudarle a construir hábitos que cambien su vida. Combinas rigor financiero con motivación real.

FILOSOFÍA FINANCIERA QUE SIGUES — EN ORDEN:
1. Claridad primero: sin saber cuánto entra y cuánto sale, no se puede planificar.
2. Fondo de emergencia: 3 meses mínimo (Esencial + Calidad de vida). Sin esto, no se invierte. Esto es no negociable.
3. Metas de ahorro: dinero con nombre y fecha. En paralelo al fondo una vez que tiene tracción.
4. Inversión: solo cuando el fondo mínimo está completo. Nunca antes.

REGLAS DE COMUNICACIÓN — NO NEGOCIABLES:
— Máximo 3 párrafos por respuesta. Nunca más de 4 líneas por párrafo.
— Una sola idea por mensaje.
— Terminas siempre con una pregunta o un reto concreto.
— Nunca más de una pregunta por mensaje.
— Sin listas largas ni bullets. Conversación natural.
— Si supera 6 líneas, córtala.

CATEGORÍAS DE GASTO QUE USA LA APP:
— Esencial: sin esto la vida se para. Entra en el fondo de emergencia.
— Calidad de vida: sin esto la vida es gris pero funciona. También entra en el fondo.
— Capricho: puede vivir sin ello. No entra en el fondo. Es la palanca de ahorro.

CÓMO ABRES (si es la primera vez o no hay datos):
"Soy FLUJO, tu asesor financiero. Veo tu situación financiera en tiempo real mientras registras datos en la app.

Si aún no has registrado nada, el mejor primer paso es ir a Balance y añadir tus ingresos mensuales. Sin eso, voy a ciegas.

¿Por dónde quieres empezar?"

CÓMO USAS EL CONTEXTO:
Siempre referencias los datos reales del usuario cuando están disponibles. Nunca preguntas algo que ya sabes por el contexto. Si ve caprichos altos, lo nombras. Si el fondo está bien, lo celebras. Si no hay datos, lo pides directamente.

CUANDO SE ACABAN LOS MENSAJES:
Si queda poco crédito, lo mencionas de forma natural y explicas que puede: (1) recargar 500 mensajes más por 19€ en la misma app, o (2) exportar las instrucciones de FLUJO y usarlo en Claude, ChatGPT o Grok de forma gratuita con su propia cuenta. No es una pared — es una transición a más autonomía.

SOBRE INVERSIÓN:
Educas, no recomiendas activos concretos. Nunca dices dónde poner el dinero. Siempre aclaras que no eres asesor licenciado para decisiones importantes. Nunca hablas de invertir si el fondo mínimo no está completo.

NUNCA:
— Nunca juzgas el gasto pasado — es información, no condena.
— Nunca das más de un paso por mensaje.
— Nunca inventas datos que no están en el contexto.
— Nunca dices "no puedo" — siempre orientas.

Respondes siempre como FLUJO.`;

  const OPENING=txs.length>0
    ? `Soy FLUJO, tu asesor financiero. Tengo acceso a tus datos en tiempo real.\n\nVeo que llevas ${txs.length} transacciones registradas. ${txs.filter(t=>t.tipo==='gasto'&&t.tipogasto==='capricho').length>0?'Tengo algunas observaciones sobre tus caprichos cuando quieras.':'El registro va bien.'}\n\n¿En qué quieres trabajar hoy?`
    : `Soy FLUJO, tu asesor financiero. Veo tu situación financiera en tiempo real mientras registras datos en la app.\n\nAún no hay datos registrados — eso es el punto de partida. El mejor primer paso es ir a Balance y añadir tus ingresos mensuales.\n\n¿Empezamos por eso o prefieres contarme primero cómo está tu situación?`;

  useEffect(()=>{
    if(chatMsgs.length===0){
      setChatMsgs([{role:'agent',content:OPENING}]);
    }
  },[]);

  // Spacer: empuja el primer mensaje hacia abajo. Se colapsa cuando hay >1 mensaje (conversación real).
  const chatPanelEl = (
    <div style={{flex:1,overflowY:'auto',padding:'12px 14px',display:'flex',flexDirection:'column',gap:9}}>
      {chatMsgs.length<=1&&<div style={{flex:1,minHeight:40}}/>}
      {chatMsgs.map((m,i)=>(
        <div key={i} style={{maxWidth:'85%',padding:'10px 13px',borderRadius:m.role==='agent'?'4px 13px 13px 13px':'13px 13px 4px 13px',fontSize:13,lineHeight:1.55,background:m.role==='agent'?GBG:'rgba(255,255,255,0.06)',border:m.role==='agent'?'0.5px solid '+GBD:'none',color:T1,alignSelf:m.role==='agent'?'flex-start':'flex-end',wordBreak:'break-word',whiteSpace:'pre-wrap'}}>
          {m.content}
        </div>
      ))}
      {loading&&(
        <div style={{maxWidth:'85%',padding:'12px 13px',borderRadius:'4px 13px 13px 13px',background:GBG,border:'0.5px solid '+GBD,alignSelf:'flex-start',display:'flex',gap:4,alignItems:'center'}}>
          {[0,1,2].map(i=><div key={i} style={{width:5,height:5,borderRadius:'50%',background:ACENTO,animation:`typing 1.2s ${i*0.2}s infinite`}}/>)}
        </div>
      )}
      <div ref={msgsEnd}/>
    </div>
  );

  async function sendChat() {
    if(!input.trim()||loading||msgCount>=MSG_LIMIT) return;
    const msg=input.trim();
    setInput('');
    const context=buildContext();
    const systemWithContext=SYSTEM_FLUJO+'\n\n'+context;
    const newMsgs=[...chatMsgs,{role:'user',content:msg}];
    setChatMsgs(newMsgs);
    setLoading(true);
    const newCount=msgCount+1;
    setMsgCount(newCount);
    lsSet('fb_msgcount',newCount);
    try {
      const res=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json','x-api-key':getKey(),'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
        body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:600,system:systemWithContext,
          messages:newMsgs.map(m=>({role:m.role==='agent'?'assistant':'user',content:m.content}))})
      });
      const data=await res.json();
      const reply=clean(data.content&&data.content[0]?data.content[0].text:'Error al conectar.');
      const updated=[...newMsgs,{role:'agent',content:reply}];
      setChatMsgs(updated);
      lsSet('fb_chat',updated);
    } catch(e) {
      setChatMsgs(p=>[...p,{role:'agent',content:'Error de conexión. Inténtalo de nuevo.'}]);
    }
    setLoading(false);
  }

  const remaining=MSG_LIMIT-msgCount;

  return (
    <div style={{display:'flex',flexDirection:'column',height:chatH,position:'fixed',top:0,left:0,right:0,background:'#000'}}>
      {/* Header */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 16px 8px',borderBottom:'0.5px solid rgba(255,255,255,0.06)',flexShrink:0,background:'rgba(0,0,0,0.98)'}}>
        <button onClick={()=>setView('dashboard')} style={{background:'none',border:'none',color:T2,fontSize:13,cursor:'pointer',fontFamily:'Inter,sans-serif',padding:'4px 0'}}>← Volver</button>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <div style={{width:28,height:28,borderRadius:8,background:ACENTO,display:'flex',alignItems:'center',justifyContent:'center',color:'#000',fontSize:14}}>⚡</div>
          <div>
            <div style={{fontSize:13,fontWeight:700,color:'#fff'}}>FLUJO</div>
            <div style={{fontSize:9,color:ACENTO}}>en línea</div>
          </div>
        </div>
        <div style={{fontSize:10,color:remaining<50?'#F87171':T3}}>{remaining} msgs</div>
      </div>

      {chatPanelEl}

      {/* Input */}
      {remaining<=0?(
        <div style={{padding:'12px 14px',borderTop:'0.5px solid rgba(255,255,255,0.06)',background:'#000',flexShrink:0}}>
          <div style={{fontSize:12,color:T2,textAlign:'center',marginBottom:8}}>Has usado todos tus mensajes.</div>
          <button style={{width:'100%',padding:10,borderRadius:10,background:GBG,border:'0.5px solid '+GBD,color:ACENTO,fontSize:12,fontWeight:700,cursor:'pointer',fontFamily:'Inter,sans-serif'}}>Recargar 500 msgs — 19€</button>
        </div>
      ):(
        <div style={{padding:'8px 12px 10px',borderTop:'0.5px solid rgba(255,255,255,0.06)',display:'flex',gap:8,alignItems:'flex-end',flexShrink:0,background:'rgba(0,0,0,0.97)'}}>
          <textarea
            ref={inputRef}
            style={{flex:1,background:'rgba(255,255,255,0.04)',border:'0.5px solid rgba(255,255,255,0.08)',borderRadius:11,padding:'10px 13px',color:'#fff',fontSize:16,fontFamily:'Inter,sans-serif',resize:'none',outline:'none',height:44,lineHeight:1.4}}
            placeholder="Escribe a FLUJO..."
            value={input}
            onChange={e=>setInput(e.target.value)}
            onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendChat();}}}
          />
          <button onClick={sendChat} disabled={!input.trim()||loading||remaining<=0}
            style={{background:(!input.trim()||loading||remaining<=0)?'rgba(52,211,153,0.2)':ACENTO,color:(!input.trim()||loading||remaining<=0)?'rgba(0,0,0,0.3)':'#000',border:'none',borderRadius:11,width:44,height:44,fontSize:20,fontWeight:700,cursor:(!input.trim()||loading||remaining<=0)?'not-allowed':'pointer',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,fontFamily:'Inter,sans-serif'}}>
            ↑
          </button>
        </div>
      )}
    </div>
  );
}

// ─── APP PRINCIPAL ────────────────────────────────────────────────────────────
function App() {
  const [view,setView]=useState('home');
  const [onboardingDone,setOnboardingDone]=useState(()=>ls('fb_onboarding',false));
  const [txs,setTxs]=useState(()=>ls('fb_txs',[]));
  const [metas,setMetas]=useState(()=>ls('fb_metas',[]));
  const [fondoSaldo,setFondoSaldo]=useState(()=>ls('fb_fondo',0));
  const [msgCount,setMsgCount]=useState(()=>ls('fb_msgcount',0));
  const [chatMsgs,setChatMsgs]=useState(()=>ls('fb_chat',[]));

  useEffect(()=>{
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      const el=document.getElementById('loading');
      if(el){el.style.opacity='0';el.style.transition='opacity 0.4s';setTimeout(()=>{if(el.parentNode)el.parentNode.removeChild(el);},400);}
    }));
  },[]);

  function completeOnboarding() {
    setOnboardingDone(true);
    lsSet('fb_onboarding',true);
    setView('dashboard');
  }

  if(!onboardingDone) {
    return (
      <div>
        <HomeAxon onDone={completeOnboarding} setView={(v)=>{completeOnboarding();setView(v);}}/>
      </div>
    );
  }

  return (
    <div>
      {view==='home'&&<HomeAxon onDone={completeOnboarding} setView={(v)=>{setView(v);}}/>}
      {view==='dashboard'&&<Dashboard txs={txs} metas={metas} fondoSaldo={fondoSaldo} setView={setView}/>}
      {view==='balance'&&<Balance txs={txs} setTxs={setTxs} setView={setView}/>}
      {view==='fondo'&&<Fondo txs={txs} fondoSaldo={fondoSaldo} setFondoSaldo={setFondoSaldo}/>}
      {view==='metas'&&<Metas metas={metas} setMetas={setMetas}/>}
      {view==='flujo'&&<FlujoChat txs={txs} metas={metas} fondoSaldo={fondoSaldo} msgCount={msgCount} setMsgCount={setMsgCount} chatMsgs={chatMsgs} setChatMsgs={setChatMsgs} setView={setView}/>}
      {view!=='flujo'&&<TabBar view={view} setView={setView} msgCount={msgCount}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>
</body>
