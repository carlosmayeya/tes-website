<script type="text/babel">
const { useState, useRef, useEffect } = React;

const PRO_KEY = 'TES2025AXON';

const IS_PRO = false;
const FREE_LIMIT = 10;
const PRO_LIMIT = 100;

function getKey() {
  return null;
}

function clean(t) {
  return t
    .replace(/#{1,6}\s+/g,'')
    .replace(/\*\*([^*]+)\*\*/g,'$1')
    .replace(/\*([^*]+)\*/g,'$1')
    .replace(/---/g,'\u2014')
    .replace(/\n{3,}/g,'\n\n')
    .trim();
}

function getCount(pro) {
  try { return parseInt(localStorage.getItem(pro?'axon_pro_count':'axon_free_count')||'0'); } catch(e) { return 0; }
}
function setCount(pro, n) {
  try { localStorage.setItem(pro?'axon_pro_count':'axon_free_count', String(n)); } catch(e) {}
}

var BLU='#4FC3F7', CA='rgba(255,255,255,0.03)', CB='rgba(255,255,255,0.07)',
    T1='rgba(255,255,255,0.88)', T2='rgba(255,255,255,0.65)', T3='rgba(255,255,255,0.4)';

const OPENING = 'Hola, soy AXON \u2014 tu gu\u00eda personal de IA. Estoy aqu\u00ed para llevarte de donde est\u00e1s hoy a usar la IA con soltura y criterio, a tu ritmo y con un plan hecho para ti.\n\nAntes de empezar, necesito entenderte. D\u00edme: \u00bfcu\u00e1l es tu mayor frustraci\u00f3n con la IA ahora mismo \u2014 o qu\u00e9 es lo primero que quieres aprender a hacer bien?';

function App() {
  const [view, setView] = useState('intro');
  const [isPro, setIsPro] = useState(() => {
    if(IS_PRO) return true;
    try { return localStorage.getItem('axon_pro')==='true'; } catch(e) { return false; }
  });
  const [modal, setModal] = useState(null);
  const [keyInput, setKeyInput] = useState('');
  const [keyError, setKeyError] = useState(false);
  const [msgs, setMsgs] = useState([{role:'agent', content:OPENING}]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const [convCount, setConvCount] = useState(()=>getCount(IS_PRO));
  const [activeSP, setActiveSP] = useState(null);
  const msgsEnd = useRef(null);

  useEffect(()=>{msgsEnd.current&&msgsEnd.current.scrollIntoView({behavior:'smooth'});},[msgs,loading]);

  useEffect(()=>{

    }));
  },[]);

  function activatePro() {
    setIsPro(true);
    try{localStorage.setItem('axon_pro','true');}catch(e){}
    setModal(null);setKeyInput('');setKeyError(false);
    setConvCount(getCount(true));
  }

  function checkKey() {
    if(keyInput.trim().toUpperCase()===PRO_KEY) activatePro();
    else setKeyError(true);
  }

    navigator.clipboard.writeText(AXON_SYSTEM).catch(()=>{});
  }

  const limit = isPro ? PRO_LIMIT : FREE_LIMIT;

  async function sendMsg() {
    if(!input.trim()||loading) return;
    const msg = input.trim();
    setInput('');
    const newCount = convCount+1;
    setConvCount(newCount);
    setCount(isPro, newCount);

    if(newCount > limit) { setModal('limit'); return; }

    const newMsgs = [...msgs, {role:'user', content:msg}];
    setMsgs(newMsgs);
    setLoading(true);

    const apiKey = getKey();
    if(!apiKey) {
      setMsgs(p=>[...p,{role:'agent',content:'El chat est\u00e1 disponible en la versi\u00f3n completa. Desbloquea el acceso por 17\u20ac o copia mis instrucciones para usarme en tu LLM favorito.'}]);

      setModal('unlock');
      return;
    }

        method:'POST',
        headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},

          messages:newMsgs.map(m=>({role:m.role==='agent'?'assistant':'user',content:m.content}))})

      const reply = clean(data.content&&data.content[0]?data.content[0].text:'Error.');

          <button onClick={()=>{copyPrompt();setModal(null);}} style={{background:'rgba(255,255,255,0.05)',color:T2,border:'1px solid rgba(255,255,255,0.1)',borderRadius:12,padding:'14px 20px',fontSize:14,fontWeight:600,cursor:'pointer',textAlign:'left'}}>
            <div style={{fontWeight:700,color:'#fff',marginBottom:4}}>Copiar instrucciones de AXON</div>
            <div style={{fontSize:12,color:T3}}>Súscame en Claude, ChatGPT o Grok — con tu LLM el agente te recuerda y mejora contigo</div>
          </button>
          {!isLimit&&(
            <div style={{display:'flex',alignItems:'center',gap:12}}>
              <div style={{flex:1,height:1,background:'rgba(255,255,255,0.08)'}}/>
              <span style={{fontSize:12,color:T3,fontWeight:600}}>ya tengo clave</span>

            </div>
          )}
          {!isLimit&&(
            <div style={{display:'flex',gap:10}}>
              <input style={{flex:1,background:'rgba(255,255,255,0.05)',border:keyError?'1px solid #ff5252':'1px solid rgba(255,255,255,0.12)',borderRadius:10,padding:'12px 14px',color:'#fff',fontSize:14,outline:'none'}} placeholder="Pega tu clave aquí..." value={keyInput} onChange={e=>{setKeyInput(e.target.value);setKeyError(false);}} onKeyDown={e=>e.key==='Enter'&&checkKey()}/>

          <button onClick={()=>setModal(null)} style={{background:'none',border:'none',color:T3,fontSize:14,cursor:'pointer',alignSelf:'center'}}>Cerrar</button>
        </div>
      </div>
    );
  }

          <div style={{fontSize:15,fontWeight:700}}>AXON</div>

        </div>
        {!isPro&&<button onClick={()=>setModal('unlock')} style={{background:BLU,color:'#000',border:'none',borderRadius:8,padding:'7px 14px',fontSize:12,fontWeight:800,cursor:'pointer'}}>Desbloquear</button>}

      <div style={{flex:1,overflowY:'auto',padding:16,display:'flex',flexDirection:'column',gap:12}}>

          <div style={{flex:1}}>
            <div style={{fontSize:17,fontWeight:800,marginBottom:3}}>Hablar con AXON</div>
            <div style={{fontSize:13,color:T2}}>{isPro?'Acceso completo · '+remaining+' conversaciones restantes':'Chat gratuito · '+remaining+' conversaciones disponibles'}</div>
          </div>
          <span style={{color:BLU,fontSize:20}}>→</span>
        </button>

        <div style={{fontSize:13,fontWeight:700,color:T3,letterSpacing:'0.08em',textTransform:'uppercase',marginBottom:16}}>Los 4 superpoderes de AXON</div>
        <div style={{display:'flex',flexDirection:'column',gap:12}}>
          {SUPERPODERES.map((sp,i)=>{
            const locked = !isPro && i>0;
            return(
              <div key={sp.id} onClick={()=>locked?setModal('unlock'):setActiveSP(activeSP===sp.id?null:sp.id)}
                style={{background:locked?'rgba(255,255,255,0.01)':CA,border:'1px solid '+(locked?'rgba(255,255,255,0.04)':activeSP===sp.id?'rgba(79,195,247,0.3)':CB),borderRadius:14,padding:'18px 20px',cursor:'pointer',opacity:locked?0.6:1,transition:'all 0.15s'}}>
                <div style={{display:'flex',alignItems:'center',gap:12}}>
                  <span style={{fontSize:22,flexShrink:0}}>{sp.emoji}</span>
                  <div style={{flex:1}}>
                    <div style={{fontSize:15,fontWeight:700,marginBottom:2}}>
                      {sp.nombre}
                      {i===0&&!isPro&&<span style={{fontSize:10,fontWeight:700,color:BLU,background:'rgba(79,195,247,0.1)',borderRadius:6,padding:'2px 7px',marginLeft:8}}>GRATIS</span>}
                      {locked&&<span style={{fontSize:14,marginLeft:8}}>🔒</span>}
                    </div>
                    <div style={{fontSize:12,color:T2}}>{sp.titulo}</div>
                  </div>
                  {!locked&&<span style={{color:'rgba(79,195,247,0.5)',fontSize:18,transform:activeSP===sp.id?'rotate(90deg)':'none',transition:'transform 0.2s'}}>›</span>}
                </div>
                {activeSP===sp.id&&(
                  <div style={{marginTop:14,paddingTop:14,borderTop:'1px solid rgba(255,255,255,0.06)'}}>
                    <div style={{fontSize:14,color:T2,lineHeight:1.65,marginBottom:12}}>{sp.descripcion}</div>
                    <div style={{background:'rgba(79,195,247,0.05)',border:'1px solid rgba(79,195,247,0.1)',borderRadius:8,padding:'10px 14px',fontSize:13,color:T2}}>
                      <span style={{color:BLU,fontWeight:600}}>Ejemplo: </span>{sp.ejemplo}
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>

        {!isPro&&(
          <div style={{marginTop:32,padding:24,background:'rgba(79,195,247,0.04)',border:'1px solid rgba(79,195,247,0.12)',borderRadius:16,textAlign:'center'}}>
            <div style={{fontSize:18,fontWeight:800,marginBottom:8}}>Desbloquea los 4 superpoderes</div>
            <div style={{fontSize:14,color:T2,marginBottom:20,lineHeight:1.6}}>Acceso completo a AXON + los 4 superpoderes + 100 conversaciones. Un solo pago, sin suscripción.</div>
            <button onClick={()=>setModal('unlock')} style={{background:BLU,color:'#000',border:'none',borderRadius:12,padding:'14px 28px',fontSize:15,fontWeight:800,cursor:'pointer',marginBottom:12,width:'100%'}}>Conseguir acceso completo — 17€</button>
            <div style={{fontSize:12,color:T3}}>O usa AXON gratis en tu LLM favorito copiando sus instrucciones</div>
          </div>
        )}
      </div>
    </div>
  );

  return null;
}

ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>
</body>
</html>
