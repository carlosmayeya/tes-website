logró y el siguiente paso. \"Acabas de aprender a dar contexto — tus respuestas cambian desde ahora. Lo siguiente: que la IA te recuerde.\"\n— Reconocimiento específico, nunca un \"¡bien!\" vacío.\n\nBLINDAJES\n\n— Si quiere saltarse pasos: \"Puedo darte el siguiente nivel, pero se apoya en este. ¿Lo consolidamos 5 minutos o vas al atajo?\"\n— Si se frustra: \"Esa frustración significa que estás justo en tu límite de aprendizaje — donde se avanza. Vamos un paso más pequeño.\"\n— Si quiere todo a la vez: \"Hay un resultado que hace fáciles todos los demás. Empecemos por ese.\"\n— Si se atasca: reduces el tamaño del paso, nunca presionas, nunca culpas.\n\nTERRITORIO Y ECOSISTEMA\n\nEres gratis y eres la puerta de entrada a Agentes Brutales. Tu especialidad es enseñar IA. Cuando el usuario tiene un problema concreto de otro dominio, tu trabajo es resolverlo a alto nivel y recomendar el agente especializado de pago que lo borda — porque tú enseñas a usar la IA, pero esos agentes ejecutan el trabajo del dominio. Lo haces con honestidad de experto, no como vendedor:\n\n— Ventas, carrera, liderazgo → \"Para eso, Agentes Brutales Pro tiene especialistas diseñados exactamente para ese terreno. Te van a dar mucho más que yo ahí.\"\n— Finanzas → \"Agentes Brutales para tus Finanzas tiene un agente que gestiona presupuestos, deudas e inversiones — lo hace 10 veces mejor que yo.\"\n— Creación de contenido → \"Agentes Brutales para Creación de Contenido tiene expertos por plataforma con el algoritmo integrado.\"\n— Negocio online, web y apps sin código → \"Agentes Brutales para tu Negocio Online te lleva de la idea al negocio funcionando.\"\n\nNunca dices \"no puedo\" — siempre rediriges al especialista correcto. Recomiendas solo cuando añade valor real al usuario en ese momento, no por vender.\n\nCuando ayuda de verdad, recomiendas contenido del canal con precisión: si el usuario quiere profundizar en los conceptos, \"la Serie 7 de Tecnología Explicada Simple explica esto a fond           </div>
          <div style={{display:'flex',gap:10}}>
            <input style={{flex:1,background:'rgba(255,255,255,0.05)',border:keyError?'1px solid #ff5252':'1px solid rgba(255,255,255,0.12)',borderRadius:10,padding:'12px 14px',color:'#fff',fontSize:14,outline:'none'}} placeholder="Pega tu clave aquí..." value={keyInput} onChange={e=>{setKeyInput(e.target.value);setKeyError(false);}} onKeyDown={e=>e.key==='Enter'&&checkKey()}/>
            <button onClick={checkKey} style={{background:'rgba(255,255,255,0.08)',color:'#fff',border:'1px solid rgba(255,255,255,0.12)',borderRadius:10,padding:'12px 16px',fontSize:14,fontWeight:700,cursor:'pointer'}}>Activar</button>
          </div>
          {keyError&&<div style={{fontSize:12,color:'#ff5252'}}>Clave incorrecta. Comprueba tu email.</div>}
          <button onClick={()=>setModal(null)} style={{background:'none',border:'none',color:T3,fontSize:14,cursor:'pointer',alignSelf:'center'}}>Cerrar</button>
        </div>
      </div>
    );
  }




  const chatPanelEl = (chatOpen && chatPrompt) ? (
    <div style={{position:'fixed',bottom:0,right:0,width:'100%',maxWidth:480,height:580,background:'#080808',border:'1px solid rgba(79,195,247,0.18)',borderBottom:'none',borderRadius:'20px 20px 0 0',display:'flex',flexDirection:'column',zIndex:200,boxShadow:'0 -20px 60px rgba(0,0,0,0.7)'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'14px 18px',borderBottom:'1px solid rgba(255,255,255,0.06)',flexShrink:0}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:8,height:8,borderRadius:'50%',background:BLU,animation:'pulse 2s infinite'}}/>
          <span style={{fontSize:15,fontWeight:700}}>{chatPrompt.nombre} <span style={{color:BLU}}>·</span> <span style={{color:T3,fontWeight:500,fontSize:13}}>{chatPrompt.subtitulo}</span></span>
        </div>
        <button onClick={()=>setChatOpen(false)} style={{background:'rgba(255,255,255,0.06)',border:'none',color:T2,width:28,height:28,borderRadius:8,cursor:'pointer',fontSize:18,display:'flex',alignItems:'center',justifyContent:'center'}}>×</button>
      </div>
      <div style={{flex:1,overflowY:'auto',padding:16,display:'flex',flexDirection:'column',gap:10}}>
        {chatMsgs.map((m,i)=>(
          <div key={i} style={{maxWidth:'85%',padding:'11px 15px',borderRadius:m.role==='agent'?'4px 14px 14px 14px':'14px 14px 4px 14px',fontSize:14,lineHeight:1.55,background:m.role==='agent'?'rgba(79,195,247,0.07)':'rgba(255,255,255,0.06)',border:m.role==='agent'?'1px solid rgba(79,195,247,0.1)':'none',color:'rgba(255,255,255,0.85)',alignSelf:m.role==='agent'?'flex-start':'flex-end',wordBreak:'break-word',whiteSpace:'pre-wrap'}}>{m.content}</div>
        ))}
        {chatLoading && (
          <div style={{maxWidth:'85%',padding:'14px 15px',borderRadius:'4px 14px 14px 14px',background:'rgba(79,195,247,0.07)',border:'1px solid rgba(79,195,247,0.1)',alignSelf:'flex-start',display:'flex',gap:4,alignItems:'center'}}>
            {[0,1,2].map(i=><div key={i} style={{width:6,height:6,borderRadius:'50%',background:BLU,animation:'typing 1.2s '+(i*0.2)+'s infinite'}}/>)}
          </div>
        )}
        <div ref={msgsEnd}/>
      </div>
      <div style={{padding:'10px 14px 16px',borderTop:'1px solid rgba(255,255,255,0.06)',display:'flex',gap:10,flexShrink:0,alignItems:'flex-end'}}>
        <textarea
          style={{flex:1,background:'rgba(255,255,255,0.05)',border:'1px solid rgba(255,255,255,0.1)',borderRadius:11,padding:'10px 14px',color:'#fff',fontSize:16,fontFamily:'inherit',resize:'none',outline:'none',height:48}}
          placeholder={'Escribe a '+chatPrompt.nombre+'...'}
          value={chatInput}
          onChange={e=>setChatInput(e.target.value)}
          onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendChat();}}}
        ></textarea>
        <button
          onClick={sendChat}
          disabled={!chatInput.trim()||chatLoading}
          style={{background:(!chatInput.trim()||chatLoading)?'rgba(79,195,247,0.2)':BLU,color:(!chatInput.trim()||chatLoading)?'rgba(0,0,0,0.3)':'#000',border:'none',borderRadius:11,width:48,height:48,fontSize:22,fontWeight:700,cursor:(!chatInput.trim()||chatLoading)?'not-allowed':'pointer',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>↑</button>
      </div>
    </div>
  ) : null;

  function Nav(){
    return(
      <div style={{position:'sticky',top:0,zIndex:100,background:'rgba(0,0,0,0.93)',backdropFilter:'blur(12px)',borderBottom:'1px solid rgba(255,255,255,0.06)',padding:'0 20px',display:'flex',alignItems:'center',justifyContent:'space-between',height:56}}>
        <div style={{display:'flex',alignItems:'center',gap:14}}>
          {view!=='cols'&&<button onClick={()=>{if(view==='detail'){setView('prompts');setActivePrompt(null);}else if(view==='prompts'){setView('cols');setActiveCol(null);}else{setView('cols');}}} style={{background:'none',border:'none',color:T2,fontSize:14,fontWeight:500,cursor:'pointer',display:'flex',alignItems:'center',gap:4}}>← Volver</button>}
          <span style={{fontSize:15,fontWeight:800,letterSpacing:'-0.02em'}}>Agentes <span style={{color:BLU}}>Brutales</span></span>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <button onClick={()=>setView('tes')} style={{background:'none',border:'1px solid rgba(255,255,255,0.1)',borderRadius:8,padding:'5px 11px',fontSize:12,fontWeight:600,color:T2,cursor:'pointer'}}>TES ↗</button>
          {isPro
            ?<div style={{background:'rgba(79,195,247,0.12)',border:'1px solid rgba(79,195,247,0.3)',borderRadius:8,padding:'5px 12px',fontSize:12,fontWeight:700,color:BLU}}>✓ PRO</div>
            :<button onClick={()=>setModal('unlock')} style={{background:BLU,color:'#000',border:'none',borderRadius:9,padding:'8px 14px',fontSize:13,fontWeight:800,cursor:'pointer'}}>Desbloquear — 19€</button>
          }
        </div>
      </div>
    );
  }

  if(view==='intro') return(
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'40px 24px',textAlign:'center'}}>
      <div style={{display:'inline-flex',alignItems:'center',gap:8,background:'rgba(79,195,247,0.1)',border:'1px solid rgba(79,195,247,0.3)',borderRadius:100,padding:'6px 16px',fontSize:12,fontWeight:700,color:BLU,letterSpacing:'0.08em',textTransform:'uppercase',marginBottom:32}}>⚡ Tecnología Explicada Simple</div>
      <div style={{fontSize:'clamp(52px,12vw,96px)',fontWeight:900,lineHeight:0.9,letterSpacing:'-0.04em',marginBottom:8}}>Agentes<br/><span style={{color:BLU}}>Brutales</span></div>
      <div style={{fontSize:'clamp(22px,5vw,40px)',fontWeight:900,letterSpacing:'-0.03em',color:'rgba(255,255,255,0.2)',marginBottom:40}}>Edición Completa</div>
      <p style={{maxWidth:500,fontSize:17,lineHeight:1.65,color:T2,marginBottom:12}}>No son prompts. Son agentes.</p>
      <p style={{maxWidth:500,fontSize:17,lineHeight:1.65,color:T2,marginBottom:40}}>Cada uno usa <strong style={{color:T1}}>métodos reales de coaching y psicología</strong> para ayudarte a conseguir resultados concretos.</p>
      <div style={{display:'flex',gap:44,marginBottom:40,flexWrap:'wrap',justifyContent:'center'}}>
        {[['27','Agentes'],['7','Colecciones'],['7','Gratis']].map(([n,l])=>(
          <div key={l+n} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
            <span style={{fontSize:40,fontWeight:900,color:BLU,letterSpacing:'-0.03em'}}>{n}</span>
            <span style={{fontSize:11,color:'rgba(255,255,255,0.35)',textTransform:'uppercase',letterSpacing:'0.1em',fontWeight:600}}>{l}</span>
          </div>
        ))}
      </div>
      <button onClick={()=>setView('cols')} style={{background:BLU,color:'#000',border:'none',borderRadius:12,padding:'16px 36px',fontSize:16,fontWeight:800,cursor:'pointer'}}>Explorar agentes →</button>
      <p style={{marginTop:16,fontSize:13,color:'rgba(255,255,255,0.35)'}}>7 gratis · Desbloquea los 27 por 19€</p>
    </div>
  );

  if(view==='cols') return(
    <div>
      <Nav/><ModalOverlay/>
      <div style={{maxWidth:880,margin:'0 auto',padding:'40px 20px 100px'}}>
        <div style={{fontSize:28,fontWeight:800,letterSpacing:'-0.03em',marginBottom:6}}>Colecciones</div>
        <div style={{fontSize:14,color:T2,marginBottom:32}}>{isPro?'27 agentes desbloqueados · Toca cualquier colección':'7 agentes gratis · 20 bloqueados · Desbloquea todo por 19€'}</div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(250px,1fr))',gap:14}}>
          {COLS.map(col=>(
            <div key={col.id} onClick={()=>{setActiveCol(col);setView('prompts');}}
              style={{background:CA,border:'1px solid '+CB,borderRadius:16,padding:22,cursor:'pointer',display:'flex',flexDirection:'column',gap:10,transition:'all 0.15s'}}
              onMouseEnter={e=>{e.currentTarget.style.background=BLU3;e.currentTarget.style.borderColor=BLUB;}}
              onMouseLeave={e=>{e.currentTarget.style.background=CA;e.currentTarget.style.borderColor=CB;}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                <span style={{fontSize:11,fontWeight:700,color:BLU,letterSpacing:'0.1em',textTransform:'uppercase'}}>Colección {col.id}</span>
                <span style={{fontSize:26}}>{col.icono}</span>
              </div>
              <div style={{fontSize:17,fontWeight:700,letterSpacing:'-0.02em',lineHeight:1.2}}>{col.nombre}</div>
              <div style={{fontSize:13,color:T2,lineHeight:1.55,flex:1}}>{col.descripcion}</div>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',paddingTop:12,borderTop:'1px solid rgba(255,255,255,0.06)'}}>
                <span style={{fontSize:12,color:T3,fontWeight:500}}>{col.prompts.length} agentes</span>
                {!isPro&&<span style={{fontSize:12,color:BLU,fontWeight:600}}>{col.prompts.filter(p=>p.free).length} gratis</span>}
                <span style={{color:'rgba(79,195,247,0.6)',fontSize:16}}>→</span>
              </div>
            </div>
          ))}
        </div>
      </div>
      {chatPanelEl}
    </div>
  );

  if(view==='prompts'&&activeCol) return(
    <div>
      <Nav/><ModalOverlay/>
      <div style={{maxWidth:880,margin:'0 auto',padding:'40px 20px 100px'}}>
        <div style={{display:'inline-flex',alignItems:'center',gap:6,background:'rgba(79,195,247,0.08)',border:'1px solid rgba(79,195,247,0.18)',borderRadius:100,padding:'4px 12px',fontSize:11,fontWeight:700,color:BLU,letterSpacing:'0.08em',marginBottom:12}}>{activeCol.icono} Colección {activeCol.id}</div>
        <div style={{fontSize:28,fontWeight:800,letterSpacing:'-0.03em',marginBottom:6}}>{activeCol.nombre}</div>
        <div style={{fontSize:14,color:T2,marginBottom:32}}>{activeCol.descripcion}</div>
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          {activeCol.prompts.map((p,i)=>{
            const locked=!isPro&&!p.free;
            return(
              <div key={p.nombre} onClick={()=>{if(locked){setModal('unlock');return;}setActivePrompt(p);setView('detail');}}
                style={{background:locked?'rgba(255,255,255,0.015)':CA,border:'1px solid '+(locked?'rgba(255,255,255,0.04)':CB),borderRadius:13,padding:'18px 22px',cursor:'pointer',display:'flex',alignItems:'center',gap:18,opacity:locked?0.75:1,transition:'all 0.15s'}}
                onMouseEnter={e=>{if(!locked){e.currentTarget.style.background=BLU3;e.currentTarget.style.borderColor=BLUB;}}}
                onMouseLeave={e=>{e.currentTarget.style.background=locked?'rgba(255,255,255,0.015)':CA;e.currentTarget.style.borderColor=locked?'rgba(255,255,255,0.04)':CB;}}>
                <div style={{fontSize:11,fontWeight:700,color:BLU,width:26,flexShrink:0}}>{String(i+1).padStart(2,'0')}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:15,fontWeight:700,letterSpacing:'-0.01em',marginBottom:2}}>
                    {p.nombre}
                    {p.free&&!isPro&&<span style={{fontSize:10,fontWeight:700,color:BLU,background:'rgba(79,195,247,0.1)',borderRadius:6,padding:'2px 7px',marginLeft:8,letterSpacing:'0.06em'}}>GRATIS</span>}
                  </div>
                  <div style={{fontSize:12,color:T2,fontWeight:500}}>{p.subtitulo}</div>
                </div>
                {locked?<span style={{fontSize:16,flexShrink:0}}>🔒</span>:<span style={{color:'rgba(79,195,247,0.5)',fontSize:16}}>→</span>}
              </div>
            );
          })}
        </div>
      </div>
      {chatPanelEl}
    </div>
  );

  if(view==='detail'&&activePrompt) return(
    <div>
      <Nav/><ModalOverlay/>
      <div style={{maxWidth:880,margin:'0 auto',padding:'40px 20px 100px'}}>
        <div style={{maxWidth:680}}>
          {activeCol&&<div style={{display:'inline-flex',alignItems:'center',gap:6,background:'rgba(79,195,247,0.07)',border:'1px solid rgba(79,195,247,0.18)',borderRadius:100,padding:'4px 12px',fontSize:11,fontWeight:700,color:BLU,letterSpacing:'0.08em',marginBottom:16}}>{activeCol.icono} {activeCol.nombre}</div>}
          <div style={{fontSize:'clamp(40px,9vw,64px)',fontWeight:900,letterSpacing:'-0.04em',lineHeight:0.92,color:BLU,marginBottom:10}}>{activePrompt.nombre}</div>
          <div style={{fontSize:18,fontWeight:600,color:'rgba(255,255,255,0.75)',marginBottom:6}}>{activePrompt.subtitulo}</div>
          <div style={{fontSize:15,color:T2,fontStyle:'italic',marginBottom:32}}>"{activePrompt.tagline}"</div>
          <div style={{background:'rgba(79,195,247,0.03)',border:'1px solid rgba(79,195,247,0.12)',borderRadius:16,overflow:'hidden',marginBottom:16}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'13px 20px',borderBottom:'1px solid rgba(79,195,247,0.08)',background:'rgba(79,195,247,0.04)'}}>
              <span style={{fontSize:11,fontWeight:700,color:BLU,letterSpacing:'0.1em',textTransform:'uppercase'}}>Las instrucciones</span>
              <button onClick={()=>copyText(activePrompt.texto,activePrompt.nombre)} style={{display:'flex',alignItems:'center',gap:6,background:copied===activePrompt.nombre?'#4caf50':BLU,color:copied===activePrompt.nombre?'#fff':'#000',border:'none',borderRadius:8,padding:'7px 14px',fontSize:12,fontWeight:700,cursor:'pointer'}}>{copied===activePrompt.nombre?'✓ Copiadas':'⎘ Copiar instrucciones'}</button>
            </div>
            <div style={{padding:22,fontSize:14,lineHeight:1.75,color:'rgba(255,255,255,0.72)',whiteSpace:'pre-wrap'}}>{activePrompt.texto}</div>
          </div>
          {isPro ? (
            <button onClick={()=>openChat(activePrompt,activeCol?activeCol.id:null)} style={{display:'flex',alignItems:'center',gap:12,width:'100%',background:'rgba(79,195,247,0.06)',border:'1px solid rgba(79,195,247,0.2)',borderRadius:13,padding:'18px 22px',cursor:'pointer',textAlign:'left',color:'#fff'}}>
              <span style={{fontSize:22,flexShrink:0}}>💬</span>
              <div>
                <div style={{fontSize:15,fontWeight:700,marginBottom:3}}>Hablar con {activePrompt.nombre}</div>
                <div style={{fontSize:12,color:T2}}>Chat directo — sin copy-paste ni setup</div>
              </div>
            </button>
          ) : (
            <button onClick={()=>setModal('unlock')} style={{display:'flex',alignItems:'center',gap:12,width:'100%',background:'rgba(255,255,255,0.02)',border:'1px solid rgba(255,255,255,0.07)',borderRadius:13,padding:'18px 22px',cursor:'pointer',textAlign:'left',color:T3}}>
              <span style={{fontSize:22,flexShrink:0}}>🔒</span>
              <div>
                <div style={{fontSize:15,fontWeight:700,marginBottom:3,color:'rgba(255,255,255,0.6)'}}>Usar {activePrompt.nombre} con tu IA</div>
                <div style={{fontSize:12}}>Disponible en Pro — desbloquea por 19€</div>
              </div>
            </button>
          )}
        </div>
      </div>
      {chatPanelEl}
    </div>
  );

  if(view==='tes') return(
    <div>
      <Nav/>
      <div style={{maxWidth:880,margin:'0 auto',padding:'40px 20px 100px'}}>
        <div style={{fontSize:28,fontWeight:800,letterSpacing:'-0.03em',marginBottom:6}}>Tecnología Explicada Simple</div>
        <div style={{fontSize:14,color:T2,marginBottom:40}}>Todo el contenido gratuito — en el canal que prefieras.</div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(220px,1fr))',gap:14}}>
          {[
            {icon:'🌐',name:'Web TES',sub:'tecnologiaexplicadasimple.com',url:'https://tecnologiaexplicadasimple.com',color:BLU},
            {icon:'▶️',name:'YouTube',sub:'@Tecnologia.Explicada.Simple',url:'https://www.youtube.com/@Tecnologia.Explicada.Simple',color:'#ff4444'},
            {icon:'📸',name:'Instagram',sub:'@tecnologia.explicada.simple',url:'https://www.instagram.com/tecnologia.explicada.simple',color:'#e1306c'},
            {icon:'🎵',name:'TikTok',sub:'@techexplicadasimple',url:'https://www.tiktok.com/@techexplicadasimple',color:'#69c9d0'}
          ].map(item=>(
            <a key={item.name} href={item.url} target="_blank" rel="noopener noreferrer"
              style={{background:CA,border:'1px solid '+CB,borderRadius:16,padding:24,display:'flex',flexDirection:'column',gap:12,textDecoration:'none',color:'#fff'}}
              onMouseEnter={e=>{e.currentTarget.style.background='rgba(255,255,255,0.06)';e.currentTarget.style.borderColor='rgba(255,255,255,0.14)';}}
              onMouseLeave={e=>{e.currentTarget.style.background=CA;e.currentTarget.style.borderColor=CB;}}>
              <span style={{fontSize:32}}>{item.icon}</span>
              <div>
                <div style={{fontSize:17,fontWeight:700,letterSpacing:'-0.02em',marginBottom:4}}>{item.name}</div>
                <div style={{fontSize:12,color:T3}}>{item.sub}</div>
              </div>
              <div style={{fontSize:13,color:item.color,fontWeight:600,marginTop:'auto'}}>Visitar →</div>
            </a>
          ))}
        </div>
        <div style={{marginTop:48,padding:24,background:'rgba(79,195,247,0.04)',border:'1px solid rgba(79,195,247,0.12)',borderRadius:16}}>
          <div style={{fontSize:15,fontWeight:700,marginBottom:8}}>¿Feedback sobre Agentes Brutales?</div>
          <div style={{fontSize:14,color:T2,marginBottom:16}}>Escríbenos por Instagram o deja un comentario en YouTube.</div>
          <a href="https://www.instagram.com/tecnologia.explicada.simple" target="_blank" rel="noopener noreferrer" style={{display:'inline-flex',alignItems:'center',gap:8,background:BLU,color:'#000',borderRadius:10,padding:'10px 20px',fontSize:13,fontWeight:700,textDecoration:'none'}}>Contactar por Instagram →</a>
        </div>
      </div>
    </div>
  );

  return null;
}

ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>
</body>
</html>
