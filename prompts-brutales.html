              <div style={{fontSize:17,fontWeight:700,letterSpacing:"-0.02em",lineHeight:1.2}}>{col.nombre}</div>
              <div style={{fontSize:13,color:"rgba(255,255,255,0.4)",lineHeight:1.5,flex:1}}>{col.descripcion}</div>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",paddingTop:12,borderTop:"1px solid rgba(255,255,255,0.06)"}}>
                <span style={{fontSize:12,color:"rgba(255,255,255,0.25)",fontWeight:500}}>{col.prompts.length} prompts</span>
                {!isPro && <span style={{fontSize:12,color:"rgba(79,195,247,0.5)",fontWeight:600}}>{col.prompts.filter(p=>p.free).length} gratis</span>}
                <span style={{color:"rgba(79,195,247,0.5)",fontSize:16}}>→</span>
              </div>
            </div>
          ))}
        </div>
      </div>
      <ModalOverlay/>
    </div>
  );

  // ── PROMPTS LIST ───────────────────────────────────────────────────────────
  if (view === "prompts" && activeCol) return (
    <div>
      <Nav/>
      <div style={{maxWidth:880,margin:"0 auto",padding:"40px 20px 100px"}}>
        <div style={{display:"inline-flex",alignItems:"center",gap:6,background:"rgba(79,195,247,0.08)",border:"1px solid rgba(79,195,247,0.18)",borderRadius:100,padding:"4px 12px",fontSize:11,fontWeight:700,color:"#4FC3F7",letterSpacing:"0.08em",marginBottom:12}}>{activeCol.icono} Colección {activeCol.id}</div>
        <div style={{fontSize:28,fontWeight:800,letterSpacing:"-0.03em",marginBottom:6}}>{activeCol.nombre}</div>
        <div style={{fontSize:14,color:"rgba(255,255,255,0.35)",marginBottom:32}}>{activeCol.descripcion}</div>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {activeCol.prompts.map((p,i) => {
            const locked = !isPro && !p.free;
            return (
              <div key={p.nombre}
                onClick={() => { if(locked){ setModal("unlock"); return; } setActivePrompt(p); setView("detail"); }}
                style={{background:locked?"rgba(255,255,255,0.015)":"rgba(255,255,255,0.03)",border:`1px solid ${locked?"rgba(255,255,255,0.04)":"rgba(255,255,255,0.07)"}`,borderRadius:13,padding:"18px 22px",cursor:"pointer",display:"flex",alignItems:"center",gap:18,opacity:locked?0.7:1,transition:"all 0.15s"}}
                onMouseEnter={e=>{ if(!locked){e.currentTarget.style.background="rgba(79,195,247,0.05)";e.currentTarget.style.borderColor="rgba(79,195,247,0.2)"}}}
                onMouseLeave={e=>{ e.currentTarget.style.background=locked?"rgba(255,255,255,0.015)":"rgba(255,255,255,0.03)";e.currentTarget.style.borderColor=locked?"rgba(255,255,255,0.04)":"rgba(255,255,255,0.07)"}}
              >
                <div style={{fontSize:11,fontWeight:700,color:"rgba(79,195,247,0.4)",width:26,flexShrink:0}}>{String(i+1).padStart(2,"0")}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:15,fontWeight:700,letterSpacing:"-0.01em",marginBottom:2}}>
                    {p.nombre}
                    {p.free && !isPro && <span style={{fontSize:10,fontWeight:700,color:"#4FC3F7",background:"rgba(79,195,247,0.1)",borderRadius:6,padding:"2px 7px",marginLeft:8,letterSpacing:"0.06em"}}>GRATIS</span>}
                  </div>
                  <div style={{fontSize:12,color:"rgba(255,255,255,0.3)",fontWeight:500}}>{p.subtitulo}</div>
                </div>
                {locked ? <span style={{fontSize:16,flexShrink:0}}>🔒</span> : <span style={{color:"rgba(79,195,247,0.4)",fontSize:16}}>→</span>}
              </div>
            );
          })}
        </div>
      </div>
      <ModalOverlay/>
    </div>
  );

  // ── DETAIL ─────────────────────────────────────────────────────────────────
  if (view === "detail" && activePrompt) return (
    <div>
      <Nav/>
      <div style={{maxWidth:880,margin:"0 auto",padding:"40px 20px 100px"}}>
        <div style={{maxWidth:680}}>
          <div style={{display:"inline-flex",alignItems:"center",gap:6,background:"rgba(79,195,247,0.07)",border:"1px solid rgba(79,195,247,0.18)",borderRadius:100,padding:"4px 12px",fontSize:11,fontWeight:700,color:"#4FC3F7",letterSpacing:"0.08em",marginBottom:16}}>{activeCol.icono} {activeCol.nombre}</div>
          <div style={{fontSize:"clamp(42px,9vw,68px)",fontWeight:900,letterSpacing:"-0.04em",lineHeight:0.92,color:"#4FC3F7",marginBottom:10}}>{activePrompt.nombre}</div>
          <div style={{fontSize:18,fontWeight:600,color:"rgba(255,255,255,0.55)",marginBottom:6}}>{activePrompt.subtitulo}</div>
          <div style={{fontSize:15,color:"rgba(255,255,255,0.3)",fontStyle:"italic",marginBottom:32}}>"{activePrompt.tagline}"</div>

          <div style={{background:"rgba(79,195,247,0.03)",border:"1px solid rgba(79,195,247,0.12)",borderRadius:16,overflow:"hidden",marginBottom:16}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"13px 20px",borderBottom:"1px solid rgba(79,195,247,0.08)",background:"rgba(79,195,247,0.04)"}}>
              <span style={{fontSize:11,fontWeight:700,color:"rgba(79,195,247,0.6)",letterSpacing:"0.1em",textTransform:"uppercase"}}>El Prompt</span>
              <button
                onClick={() => copy(activePrompt.texto, activePrompt.nombre)}
                style={{display:"flex",alignItems:"center",gap:6,background:copied===activePrompt.nombre?"#4caf50":"#4FC3F7",color:copied===activePrompt.nombre?"#fff":"#000",border:"none",borderRadius:8,padding:"7px 14px",fontSize:12,fontWeight:700,cursor:"pointer"}}
              >{copied===activePrompt.nombre?"✓ Copiado":"⎘ Copiar"}</button>
            </div>
            <div style={{padding:22,fontSize:14,lineHeight:1.75,color:"rgba(255,255,255,0.72)",whiteSpace:"pre-wrap"}}>{activePrompt.texto}</div>
          </div>

          {isPro ? (
            <button onClick={() => openChat(activePrompt)} style={{display:"flex",alignItems:"center",gap:12,width:"100%",background:"rgba(79,195,247,0.06)",border:"1px solid rgba(79,195,247,0.18)",borderRadius:13,padding:"18px 22px",cursor:"pointer",textAlign:"left",color:"#fff"}}>
              <span style={{fontSize:22,flexShrink:0}}>💬</span>
              <div>
                <div style={{fontSize:15,fontWeight:700,marginBottom:3}}>Hablar con {activePrompt.nombre}</div>
                <div style={{fontSize:12,color:"rgba(255,255,255,0.4)"}}>Chatea directamente con este agente — sin copy-paste</div>
              </div>
            </button>
          ) : (
            <button onClick={() => setModal("unlock")} style={{display:"flex",alignItems:"center",gap:12,width:"100%",background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:13,padding:"18px 22px",cursor:"pointer",textAlign:"left",color:"rgba(255,255,255,0.4)"}}>
              <span style={{fontSize:22,flexShrink:0}}>🔒</span>
              <div>
                <div style={{fontSize:15,fontWeight:700,marginBottom:3,color:"rgba(255,255,255,0.6)"}}>Hablar con {activePrompt.nombre}</div>
                <div style={{fontSize:12}}>Disponible en Pro — desbloquea por 19€</div>
              </div>
            </button>
          )}
        </div>
      </div>
      <ModalOverlay/>

      {/* CHAT PANEL */}
      {chatOpen && chatPrompt && (
        <div style={{position:"fixed",bottom:0,right:0,width:"100%",maxWidth:420,height:580,background:"#080808",border:"1px solid rgba(79,195,247,0.18)",borderBottom:"none",borderRadius:"20px 20px 0 0",display:"flex",flexDirection:"column",zIndex:200,boxShadow:"0 -20px 60px rgba(0,0,0,0.7)"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 18px",borderBottom:"1px solid rgba(255,255,255,0.06)",flexShrink:0}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div style={{width:8,height:8,borderRadius:"50%",background:"#4FC3F7",animation:"pulse 2s infinite"}}/>
              <span style={{fontSize:15,fontWeight:700}}>{chatPrompt.nombre} <span style={{color:"#4FC3F7"}}>·</span> <span style={{color:"rgba(255,255,255,0.4)",fontWeight:500,fontSize:13}}>{chatPrompt.subtitulo}</span></span>
            </div>
            <button onClick={() => setChatOpen(false)} style={{background:"rgba(255,255,255,0.06)",border:"none",color:"rgba(255,255,255,0.5)",width:28,height:28,borderRadius:8,cursor:"pointer",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
          </div>
          <div style={{flex:1,overflowY:"auto",padding:16,display:"flex",flexDirection:"column",gap:10}}>
            {chatMsgs.map((m,i) => (
              <div key={i} style={{maxWidth:"85%",padding:"11px 15px",borderRadius:m.role==="agent"?"4px 14px 14px 14px":"14px 14px 4px 14px",fontSize:14,lineHeight:1.55,background:m.role==="agent"?"rgba(79,195,247,0.07)":"rgba(255,255,255,0.06)",border:m.role==="agent"?"1px solid rgba(79,195,247,0.1)":"none",color:"rgba(255,255,255,0.85)",alignSelf:m.role==="agent"?"flex-start":"flex-end"}}>{m.content}</div>
            ))}
            {chatLoading && (
              <div style={{maxWidth:"85%",padding:"14px 15px",borderRadius:"4px 14px 14px 14px",background:"rgba(79,195,247,0.07)",border:"1px solid rgba(79,195,247,0.1)",alignSelf:"flex-start",display:"flex",gap:4,alignItems:"center"}}>
                {[0,1,2].map(i => <div key={i} style={{width:6,height:6,borderRadius:"50%",background:"#4FC3F7",animation:`typing 1.2s ${i*0.2}s infinite`}}/>)}
              </div>
            )}
            <div ref={msgsEnd}/>
          </div>
          <div style={{padding:"10px 14px 16px",borderTop:"1px solid rgba(255,255,255,0.06)",display:"flex",gap:10,flexShrink:0}}>
            <textarea
              style={{flex:1,background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:11,padding:"10px 14px",color:"#fff",fontSize:14,fontFamily:"inherit",resize:"none",outline:"none",minHeight:44,maxHeight:120}}
              placeholder={`Escribe a ${chatPrompt.nombre}...`}
              value={chatInput}
              onChange={e => setChatInput(e.target.value)}
              onKeyDown={e => { if(e.key==="Enter"&&!e.shiftKey){ e.preventDefault(); sendChat(); }}}
              rows={1}
            />
            <button
              onClick={sendChat}
              disabled={!chatInput.trim()||chatLoading}
              style={{background:!chatInput.trim()||chatLoading?"rgba(79,195,247,0.2)":"#4FC3F7",color:!chatInput.trim()||chatLoading?"rgba(0,0,0,0.4)":"#000",border:"none",borderRadius:11,width:44,height:44,fontSize:20,cursor:!chatInput.trim()||chatLoading?"not-allowed":"pointer",display:"flex",alignItems:"center",justifyContent:"center",alignSelf:"flex-end",flexShrink:0}}
            >↑</button>
          </div>
        </div>
      )}
    </div>
  );

  // ── MODAL DESBLOQUEAR ──────────────────────────────────────────────────────
  return null;

}

ReactDOM.createRoot(document.getElementById("app")).render(<App/>);
</script>

<script>
window.addEventListener("load", () => {
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isStandalone = window.navigator.standalone;
  if (isIOS && !isStandalone) {
    const banner = document.createElement("div");
    banner.style.cssText = "position:fixed;bottom:0;left:0;right:0;background:#0d0d0d;border-top:1px solid rgba(79,195,247,0.2);padding:14px 20px;display:flex;align-items:center;gap:12px;z-index:999;font-family:Inter,sans-serif";
    banner.innerHTML = `<span style="font-size:22px">⚡</span><div style="flex:1"><div style="font-size:13px;font-weight:700;color:#fff">Instalar en iPhone</div><div style="font-size:12px;color:rgba(255,255,255,0.45)">Toca <strong>Compartir</strong> → "Añadir a pantalla de inicio"</div></div><button onclick="this.parentElement.remove()" style="background:none;border:none;color:rgba(255,255,255,0.3);font-size:20px;cursor:pointer">×</button>`;

  }
});
</script>
