        texto:`Eres Axon. Tu único objetivo es que el usuario aprenda cualquier concepto, habilidad o tema de forma rápida, clara y duradera — adaptándote siempre a su nivel real, no al que dice tener.

REGLAS OBLIGATORIAS (síguelas al 100% sin excepciones):
1. Antes de enseñar nada, haz exactamente esta pregunta: "¿Qué sabes ya de este tema y qué quieres poder hacer con ello cuando lo domines?" La respuesta define el punto de partida y el destino.
2. Cada explicación sigue esta estructura inamovible: analogía del mundo real → concepto → ejemplo concreto → pregunta de comprobación. Si no puedes encontrar una analogía real, el concepto no está suficientemente claro todavía.

  const [keyError, setKeyError] = useState(false);

  const [chatPrompt, setChatPrompt] = useState(null);
  const [chatMsgs, setChatMsgs] = useState([]);
  const [chatInput, setChatInput] = useState("");
  const [chatLoading, setChatLoading] = useState(false);
  const [copied, setCopied] = useState(null);
  const msgsEnd = useRef(null);

  useEffect(() => { msgsEnd.current?.scrollIntoView({ behavior:"smooth" }); }, [chatMsgs, chatLoading]);

  const activatePro = () => {
    setIsPro(true);
    try { localStorage.setItem("pb_pro","true"); } catch(e) {}
    setModal(null); setKeyInput(""); setKeyError(false);
  };

  const checkKey = () => {
    if (keyInput.trim().toUpperCase() === PRO_KEY) activatePro();
    else setKeyError(true);
  };

  const copy = (texto, id) => {
    navigator.clipboard.writeText(texto);
    setCopied(id);
    setTimeout(() => setCopied(null), 2000);
  };

  const openChat = (prompt) => {
    setChatPrompt(prompt);
    setChatMsgs([{ role:"agent", content:`Hola. Soy ${prompt.nombre} — ${prompt.subtitulo}. ${prompt.tagline} ¿En qué te ayudo?` }]);
    setChatOpen(true);
  };

  const sendChat = async () => {
    if (!chatInput.trim() || chatLoading) return;
    const msg = chatInput.trim();
    setChatInput("");
    const newMsgs = [...chatMsgs, { role:"user", content:msg }];
    setChatMsgs(newMsgs);
    setChatLoading(true);
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{ "Content-Type":"application/json", "anthropic-dangerous-direct-browser-access":"true" },
        body: JSON.stringify({
          model:"claude-sonnet-4-6",
          max_tokens:1000,
          system: chatPrompt.texto,
          messages: newMsgs.map(m => ({ role: m.role === "agent" ? "assistant" : "user", content: m.content }))
        })
      });
      const data = await res.json();
      setChatMsgs(prev => [...prev, { role:"agent", content: data.content?.[0]?.text || "Error de conexión." }]);
    } catch {
      setChatMsgs(prev => [...prev, { role:"agent", content:"Error de conexión. Inténtalo de nuevo." }]);
    } finally { setChatLoading(false); }
  };

      <div onClick={e => e.stopPropagation()} style={{background:"#0d0d0d",border:"1px solid rgba(255,255,255,0.1)",borderBottom:"none",borderRadius:"20px 20px 0 0",padding:"32px 28px 48px",width:"100%",maxWidth:480,display:"flex",flexDirection:"column",gap:20}}>

          <div style={{fontSize:14,color:"rgba(255,255,255,0.7)",lineHeight:1.55}}>47 agentes completos + chat directo con cualquier agente desde la app.</div>
        </div>

            <div key={text} style={{display:"flex",alignItems:"center",gap:10,fontSize:14,color:"rgba(255,255,255,0.6)"}}><span>{icon}</span><span>{text}</span></div>
          ))}
        </div>
        <button onClick={() => window.open(GUMROAD_URL,"_blank")} style={{background:"#4FC3F7",color:"#000",border:"none",borderRadius:12,padding:"16px 24px",fontSize:16,fontWeight:800,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <span>Conseguir acceso — 19€</span>
          <span style={{fontSize:12,fontWeight:600,opacity:0.7}}>Pago único · acceso permanente</span>
        </button>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{flex:1,height:1,background:"rgba(255,255,255,0.08)"}}/>
          <span style={{fontSize:12,color:"rgba(255,255,255,0.3)",fontWeight:600}}>ya tengo clave de acceso</span>
          <div style={{flex:1,height:1,background:"rgba(255,255,255,0.08)"}}/>
        </div>

      </button>
      <p style={{marginTop:16,fontSize:13,color:"rgba(255,255,255,0.3)"}}>16 agentes gratis · Desbloquea los 47 por 19€</p>

      <div style={{display:"flex",alignItems:"center",gap:14}}>
        {view !== "cols" && (
          <button onClick={() => { if(view==="detail"){ setView("prompts"); setActivePrompt(null); } else { setView("cols"); setActiveCol(null); }}} style={{background:"none",border:"none",color:"rgba(255,255,255,0.7)",fontSize:14,fontWeight:500,cursor:"pointer",display:"flex",alignItems:"center",gap:4}}>← Volver</button>
        )}
        <span style={{fontSize:15,fontWeight:800,letterSpacing:"-0.02em"}}>Agentes <span style={{color:"#4FC3F7"}}>Brutales</span></span>
      </div>
      {isPro
        ? <div style={{background:"rgba(79,195,247,0.12)",border:"1px solid rgba(79,195,247,0.3)",borderRadius:8,padding:"5px 12px",fontSize:12,fontWeight:700,color:"#4FC3F7"}}>✓ PRO</div>
        : <button onClick={() => setModal("unlock")} style={{background:"#4FC3F7",color:"#000",border:"none",borderRadius:9,padding:"8px 16px",fontSize:13,fontWeight:800,cursor:"pointer"}}>Desbloquear — 19€</button>
      }
    </div>
  );

  // ── COLECCIONES ────────────────────────────────────────────────────────────
  if (view === "cols") return (
    <div>
      <Nav/>
      <div style={{maxWidth:880,margin:"0 auto",padding:"40px 20px 100px"}}>
        <div style={{fontSize:28,fontWeight:800,letterSpacing:"-0.03em",marginBottom:6}}>Colecciones</div>
        <div style={{fontSize:14,color:"rgba(255,255,255,0.65)",marginBottom:32}}>
          {isPro ? "47 agentes desbloqueados · Toca cualquier colección" : "16 agentes gratis · 31 bloqueados · Desbloquea todo por 19€"}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(250px,1fr))",gap:14}}>
          {COLECCIONES.map(col => (
            <div key={col.id}
              onClick={() => { setActiveCol(col); setView("prompts"); }}
              style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:16,padding:22,cursor:"pointer",display:"flex",flexDirection:"column",gap:10,transition:"all 0.15s"}}
              onMouseEnter={e=>{e.currentTarget.style.background="rgba(79,195,247,0.05)";e.currentTarget.style.borderColor="rgba(79,195,247,0.22)"}}
              onMouseLeave={e=>{e.currentTarget.style.background="rgba(255,255,255,0.03)";e.currentTarget.style.borderColor="rgba(255,255,255,0.07)"}}
            >
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                <span style={{fontSize:11,fontWeight:700,color:"rgba(79,195,247,0.6)",letterSpacing:"0.1em",textTransform:"uppercase"}}>Colección {col.id}</span>
                <span style={{fontSize:26}}>{col.icono}</span>
              </div>
              <div style={{fontSize:17,fontWeight:700,letterSpacing:"-0.02em",lineHeight:1.2}}>{col.nombre}</div>
              <div style={{fontSize:13,color:"rgba(255,255,255,0.7)",lineHeight:1.5,flex:1}}>{col.descripcion}</div>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",paddingTop:12,borderTop:"1px solid rgba(255,255,255,0.06)"}}>
                <span style={{fontSize:12,color:"rgba(255,255,255,0.55)",fontWeight:500}}>{col.prompts.length} prompts</span>

              </div>
            </div>
          ))}
        </div>
      </div>
      <ModalOverlay/>
    </div>
  );

  // ── PROMPTS LIST ───────────────────────────────────────────────────────────
  if (view === "prompts" && activeCol) return (

      <div style={{maxWidth:880,margin:"0 auto",padding:"40px 20px 100px"}}>

        <div style={{fontSize:28,fontWeight:800,letterSpacing:"-0.03em",marginBottom:6}}>{activeCol.nombre}</div>
        <div style={{fontSize:14,color:"rgba(255,255,255,0.65)",marginBottom:32}}>{activeCol.descripcion}</div>

          {activeCol.prompts.map((p,i) => {
            const locked = !isPro && !p.free;
            return (
              <div key={p.nombre}
                onClick={() => { if(locked){ setModal("unlock"); return; } setActivePrompt(p); setView("detail"); }}
                style={{background:locked?"rgba(255,255,255,0.015)":"rgba(255,255,255,0.03)",border:`1px solid ${locked?"rgba(255,255,255,0.04)":"rgba(255,255,255,0.07)"}`,borderRadius:13,padding:"18px 22px",cursor:"pointer",display:"flex",alignItems:"center",gap:18,opacity:locked?0.7:1,transition:"all 0.15s"}}
                onMouseEnter={e=>{ if(!locked){e.currentTarget.style.background="rgba(79,195,247,0.05)";e.currentTarget.style.borderColor="rgba(79,195,247,0.2)"}}}
                onMouseLeave={e=>{ e.currentTarget.style.background=locked?"rgba(255,255,255,0.015)":"rgba(255,255,255,0.03)";e.currentTarget.style.borderColor=locked?"rgba(255,255,255,0.04)":"rgba(255,255,255,0.07)"}}

              </div>
            </button>
          )}
        </div>
      </div>
      <ModalOverlay/>

      {/* CHAT PANEL */}
      {chatOpen && chatPrompt && (

          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 18px",borderBottom:"1px solid rgba(255,255,255,0.06)",flexShrink:0}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div style={{width:8,height:8,borderRadius:"50%",background:"#4FC3F7",animation:"pulse 2s infinite"}}/>
              <span style={{fontSize:15,fontWeight:700}}>{chatPrompt.nombre} <span style={{color:"#4FC3F7"}}>·</span> <span style={{color:"rgba(255,255,255,0.4)",fontWeight:500,fontSize:13}}>{chatPrompt.subtitulo}</span></span>
            </div>
            <button onClick={() => setChatOpen(false)} style={{background:"rgba(255,255,255,0.06)",border:"none",color:"rgba(255,255,255,0.5)",width:28,height:28,borderRadius:8,cursor:"pointer",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
          </div>
          <div style={{flex:1,overflowY:"auto",padding:16,display:"flex",flexDirection:"column",gap:10}}>
            {chatMsgs.map((m,i) => (
              <div key={i} style={{maxWidth:"85%",padding:"11px 15px",borderRadius:m.role==="agent"?"4px 14px 14px 14px":"14px 14px 4px 14px",fontSize:14,lineHeight:1.55,background:m.role==="agent"?"rgba(79,195,247,0.07)":"rgba(255,255,255,0.06)",border:m.role==="agent"?"1px solid rgba(79,195,247,0.1)":"none",color:"rgba(255,255,255,0.85)",alignSelf:m.role==="agent"?"flex-start":"flex-end"}}>{m.content}</div>
            ))}
            {chatLoading && (
              <div style={{maxWidth:"85%",padding:"14px 15px",borderRadius:"4px 14px 14px 14px",background:"rgba(79,195,247,0.07)",border:"1px solid rgba(79,195,247,0.1)",alignSelf:"flex-start",display:"flex",gap:4,alignItems:"center"}}>
                {[0,1,2].map(i => <div key={i} style={{width:6,height:6,borderRadius:"50%",background:"#4FC3F7",animation:`typing 1.2s ${i*0.2}s infinite`}}/>)}
              </div>
            )}
            <div ref={msgsEnd}/>
          </div>
          <div style={{padding:"10px 14px 16px",borderTop:"1px solid rgba(255,255,255,0.06)",display:"flex",gap:10,flexShrink:0}}>
            <textarea
              style={{flex:1,background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:11,padding:"10px 14px",color:"#fff",fontSize:14,fontFamily:"inherit",resize:"none",outline:"none",minHeight:44,maxHeight:120}}
              placeholder={`Escribe a ${chatPrompt.nombre}...`}
              value={chatInput}
              onChange={e => setChatInput(e.target.value)}
              onKeyDown={e => { if(e.key==="Enter"&&!e.shiftKey){ e.preventDefault(); sendChat(); }}}
              rows={1}
            />
            <button
              onClick={sendChat}
              disabled={!chatInput.trim()||chatLoading}
              style={{background:!chatInput.trim()||chatLoading?"rgba(79,195,247,0.2)":"#4FC3F7",color:!chatInput.trim()||chatLoading?"rgba(0,0,0,0.4)":"#000",border:"none",borderRadius:11,width:44,height:44,fontSize:20,cursor:!chatInput.trim()||chatLoading?"not-allowed":"pointer",display:"flex",alignItems:"center",justifyContent:"center",alignSelf:"flex-end",flexShrink:0}}
            >↑</button>
          </div>
        </div>
      )}
    </div>
  );

  // ── MODAL DESBLOQUEAR ──────────────────────────────────────────────────────
  return null;

}

ReactDOM.createRoot(document.getElementById("app")).render(<App/>);
</script>
