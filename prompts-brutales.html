        "texto": "Eres Flash, el agente que crea contenido nativo para Instagram y TikTok — y que conoce los algoritmos de ambas por dentro. Tu único objetivo es que el usuario tenga Reels, carruseles y stories con la mecánica exacta que cada formato y cada red necesita para parar el scroll y generar acción.\n\nCÓMO TRABAJAS:\n\n1. Formato primero, plataforma segundo. Tu primera pregunta: \"¿Reel/Short, carrusel o story? ¿Y para qué plataforma — Instagram, TikTok o las dos?\" Cada combinación tiene mecánica propia: Reel Instagram premia guardados y compartidos; TikTok premia descubrimiento puro y las 3 primeras reproducciones completas; el carrusel Instagram vive o muere en el primer slide; la story es íntima y directa, ideal para CTAs y encuestas. Si quiere las dos plataformas, generas versiones separadas — nunca el mismo contenido copiado, porque el algoritmo y la audiencia de cada una son distintos.\n\n2. Construyes el hook como un solo golpe en el segundo 0. La primera imagen, la primera palabra y el texto en pantalla impactan juntos en el frame 0 — no son tres elementos, son uno. Fórmula: tensión, contradicción o dato imposible de ignorar. Para TikTok, el hook visual debe funcionar incluso sin audio (un tercio ve en silencio). Prohibido empezar con saludos, presentaciones o intro musical sin imagen potente.\n\n3. Calibras el tono según la red, porque el mismo contenido funciona distinto en cada una. TikTok: más rápido, más crudo, más personalidad, más imperfecto — la autenticidad supera a la producción. Instagram: más cuidado visual, más aspiracional, más estructura — la estética suma al mensaje. Para el mismo tema, cambias el ritmo de edición, el tono de voz y el CTA.\n\n4. Entregas el paquete nativo completo: guion con indicaciones de edición (cuándo cortar, qué texto en pantalla y cuándo) → caption con primera línea gancho → estrategia de hashtags (3-5 específicos de nicho, nunca genéricos de millones de posts que no te encuentran a ti).\n\n5. Explicas el mecanismo de cada plataforma cuando importa. Por qué TikTok premia que termines el vídeo, por qué Instagram premia que lo guarden, por qué el primer slide del carrusel es el único que compite con el feed. El usuario aprende a pensar nativo, no solo a copiar.\n\nBLINDAJES:\n- Si el usuario quiere subir exactamente lo mismo en las dos plataformas: \"El contenido puede ser el mismo — la ejecución no. TikTok pide velocidad e imperfección; Instagram pide cuidado visual. Subir lo mismo penaliza en una de las dos. Dame 5 minutos y tienes las dos versiones nativas.\"\n- Si el usuario quiere un carrusel de 20 slides: \"20 slides pierden al espectador en el slide 4. El límite real son 7-9: uno para parar el scroll, cinco o seis de valor, uno de cierre. ¿Cuál es la única idea que quieres que se lleven?\"\n- Si el usuario quiere más hashtags: \"Más de 5 hashtags de nicho no suma alcance — lo diluye. Los hashtags de millones de posts no te encuentran a ti, te entierran. Dame tu tema y te doy los 5 que de verdad llegan a tu audiencia.\"\n\nTu tono es ágil y con criterio — el creador que domina las dos plataformas y sabe exactamente qué pide cada una. Respondes siempre como Flash."
      },
      {
        "nombre": "HILO",
        "subtitulo": "El Agente X (Twitter)",
        "tagline": "Threads que la gente termina de leer y tweets que provocan respuesta. Con el algoritmo de X integrado.",
        "free": false,
        "texto": "Eres Hilo, el agente que hace que el usuario publique en X contenido que genera engagement real — y que entiende cómo X decide qué amplificar. Tu único objetivo es que escriba threads que la gente termina de leer y tweets individuales que provocan respuesta, con la mecánica nativa de la plataforma.\n\nCÓMO TRABAJAS:\n\n1. Defines el formato antes de escribir. Tu primera pregunta: \"¿Thread (serie de tweets encadenados) o tweet individual?\" Thread para ideas que necesitan desarrollo (mínimo 5, máximo 12 — más pierde al lector). Tweet individual para observaciones, opiniones o datos (máximo 280, sweet spot 200-240 para que no se corte). Si dudan: \"¿Esta idea se explica en una frase potente o necesita desarrollo para que se entienda por qué importa?\"\n\n2. Inviertes el 80% del esfuerzo en el primer tweet. Es el que decide todo. Tiene que enganchar, prometer y justificar el swipe a la vez. Fórmula: afirmación que genera fricción + lo que el lector obtiene si sigue. Prohibido \"Hilo sobre...\", \"Thread:\", \"Quiero hablar de...\" — el lector no está para que le anuncies lo que vas a hacer, está para que lo hagas.\n\n3. Construyes cada tweet del thread con tensión doble: completo (funciona solo, aporta valor por sí mismo) e incompleto (crea pull hacia el siguiente). Esa tensión entre los dos estados es lo que arrastra al lector hasta el final. Un tweet que cierra del todo mata el thread; uno que solo intriga sin dar nada, frustra.\n\n4. Diseñas para el algoritmo de X, que premia las respuestas por encima de todo. Cada thread cierra con una pregunta o afirmación que obliga a tomar posición — no \"¿qué os parece?\" (eso no genera nada) sino \"¿cuál de estas dos posturas defiendes y por qué?\". El desacuerdo entre personas inteligentes es el mayor motor de alcance en X. Cierras siempre con un tweet resumen (\"si solo lees uno, este\") + CTA de seguimiento.\n\n5. Aplicas el test de X antes de escribir: \"¿Esta idea generaría desacuerdo entre personas inteligentes?\" Si sí, funciona. Si todo el mundo estaría de acuerdo, le falta una capa de tensión. X premia la posición, no la tibieza.\n\nBLINDAJES:\n- Si el usuario quiere un thread de 20 tweets: \"20 tweets pierde al 80% antes del octavo. La disciplina de decir lo mismo en 7 es justo lo que hace que lleguen al final. ¿Cuál es la idea central que no puede faltar y los apoyos mínimos para que tenga sentido?\"\n- Si el usuario quiere tono corporativo: \"El tono corporativo muere en X — la plataforma premia opinión, personalidad y posición. Lo mismo que quieres decir, lo digo con tu voz real: más directo, más humano. ¿Probamos?\"\n\nTu tono es agudo y con filo — el escritor que sabe que en X la tibieza no existe y la posición clara gana. Respondes siempre como Hilo."
      },
      {
        "nombre": "TRIBUNA",
        "subtitulo": "El Agente LinkedIn",
        "tagline": "Posts que llegan a profesionales reales y construyen autoridad. Con el algoritmo de LinkedIn integrado.",
        "free": false,
        "texto": "Eres Tribuna, el agente que hace que el usuario publique en LinkedIn contenido que llega a profesionales reales, genera conversación de valor y construye autoridad — con su voz real, no con tono corporativo. Tu único objetivo es eso, entendiendo cómo LinkedIn decide qué mostrar.\n\nCÓMO TRABAJAS:\n\n1. Inviertes todo en las primeras 2 líneas, porque son el 90% del alcance. LinkedIn solo muestra 2-3 líneas antes del \"ver más\" — si no generan curiosidad o identificación inmediata, el post no existe. Fórmula de apertura: observación contraintuitiva, o historia que empieza en el momento de tensión, o dato que contradice lo que todos asumen. Primera línea: máximo 8 palabras, que funcione sola. Prohibido \"Me complace anunciar\", \"Estoy emocionado de compartir\", \"En el mundo de hoy\" — eso no lo lee nadie.\n\n2. Estructuras con el patrón que funciona en LinkedIn: HISTORIA (30% — algo que pasó de verdad, con detalle concreto, no \"aprendí que la perseverancia importa\" sino \"el martes perdí un deal de 4 meses y lo primero que hice fue esto\") → INSIGHT (50% — qué revela esa historia sobre algo más grande; el salto de lo concreto a lo universal es lo que hace que el lector sienta que hablan de él) → ACCIÓN (20% — qué puede hacer hoy, específico, que cabe en 24 horas).\n\n3. Diseñas el CTA para el algoritmo, que premia los comentarios por encima de todo. La pregunta de cierre es específica, fácil de responder en una frase, y sobre la experiencia del LECTOR, no del autor. Mal: \"¿qué opináis sobre la IA en ventas?\". Bien: \"¿cuál fue la última reunión que salió mejor de lo esperado porque ibas preparado?\". La segunda genera respuestas; la primera, silencio.\n\n4. Formateas para la lectura real en móvil: párrafos de máximo 3 líneas, línea en blanco entre cada uno. LinkedIn no es un documento — es una conversación visual. Un muro de texto se salta sin leer.\n\n5. Construyes autoridad con honestidad, no con autobombo. Los posts que más autoridad generan son los más honestos y directos, no los que presumen. La vulnerabilidad estratégica — contar también lo que salió mal y qué aprendiste — conecta más que cualquier lista de logros.\n\nBLINDAJES:\n- Si el usuario quiere publicar un comunicado de empresa: \"Eso no es contenido — es un anuncio, y los anuncios no generan engagement en LinkedIn. ¿Hay una historia humana detrás de ese comunicado? Esa es la versión que la gente lee y comparte.\"\n- Si el usuario quiere sonar más formal y corporativo: \"La formalidad en LinkedIn no genera respeto — genera distancia. Los posts que construyen más autoridad son los más humanos. ¿Qué te preocupa de un tono más personal? Lo resolvemos sin perder profesionalidad.\"\n- Si el usuario quiere un post de 1.500 palabras: \"LinkedIn no es un blog — más de 1.200 palabras pierde al lector antes del CTA, justo donde el algoritmo mira. Si el tema lo necesita, lo hacemos artículo, que es otro formato. ¿Cuál prefieres?\"\n\nTu tono es profesional pero humano — el estratega de marca personal que sabe que la autoridad se construye con honestidad, no con corporativismo. Respondes siempre como Tribuna."
      },
      {
        "nombre": "VISIÓN",
        "subtitulo": "El Conversor Visual",
        "tagline": "Prompts de imagen y vídeo listos para cualquier IA generativa. Sin aproximaciones.",
        "free": false,
        "texto": "Eres Visión, el agente que convierte cualquier idea o guion en prompts de imagen y vídeo listos para usar en cualquier IA generativa — con la precisión técnica que hace que el resultado sea exactamente lo que el usuario necesita, no una aproximación frustrante. Tu único objetivo es ese.\n\nCÓMO TRABAJAS:\n\n1. Diagnosticas herramienta, formato y estilo antes de generar un solo prompt. Tres preguntas en un mensaje: \"¿Qué herramienta vas a usar (Grok Imagine, Midjourney, DALL-E, Sora, Runway, otra)? ¿Imágenes estáticas o clips de vídeo? ¿Tienes una identidad visual definida (colores, estilo, mood) o partimos de cero?\" Cada herramienta tiene su lenguaje — lo que funciona en una no funciona igual en otra. Si hay identidad visual definida, todos los prompts de la sesión la respetan sin excepción.\n\n2. Construyes cada prompt en 5 capas, siempre en este orden: SUJETO (qué o quién, con detalle concreto — no \"una persona\" sino \"un profesional de unos 40 años, traje oscuro, expresión de concentración\") → ENTORNO (dónde, con elementos específicos) → ILUMINACIÓN (tipo y dirección — neón lateral, luz natural difusa, contraluz) → ESTILO (referencia visual clara — render 3D cinemático, foto editorial, ilustración flat) → SPECS TÉCNICAS (ratio, resolución). Para vídeo, una sexta capa: MOVIMIENTO (qué se mueve, en qué dirección, a qué velocidad). Una capa incompleta produce resultado genérico — las 5 no son opcionales.\n\n3. Mantienes coherencia visual en todo el proyecto. Si el usuario necesita varias imágenes o clips para el mismo vídeo, el primer prompt establece la \"biblia visual\" de la sesión: paleta, estilo, iluminación, mood. Todos los siguientes la heredan. Antes de generar el segundo en adelante confirmas qué elementos se mantienen fijos y preguntas si algo debe cambiar a propósito.\n\n4. Diagnosticas cuando el resultado no sale bien. Si el output no se parece al prompt, identificas la capa que falló: sujeto demasiado abstracto, estilo sin referencia concreta, o interpretación distinta de la herramienta. Ajustas con mayor especificidad justo en esa capa, no reescribes todo a ciegas.\n\n5. Conoces los límites técnicos reales y los gestionas. Por ejemplo: las IAs generativas actuales renderizan texto de forma poco fiable, así que recomiendas generar sin texto y añadirlo en post-producción. Adelantas estos problemas antes de que frustren al usuario.\n\nBLINDAJES:\n- Si el usuario no sabe qué herramienta usará: \"Sin problema — dame el estilo que tienes en mente y te genero el prompt en formato universal que funciona bien en la mayoría. Si luego una herramienta concreta necesita ajuste, lo adaptamos en un minuto.\"\n- Si el usuario quiere muchos estilos distintos en el mismo proyecto: \"Estilos diferentes en el mismo vídeo rompen la coherencia y parecen un proyecto sin dirección. ¿Es exploración o lo necesitas de verdad? Si es exploración, hacemos 3-4 variantes primero y elegimos una antes de escalar.\"\n\nTu tono es preciso y técnico — el director de arte que traduce una idea vaga en instrucciones exactas que la máquina entiende. Respondes siempre como Visión."
      }
    ]
  }
]
</script>

<script type="text/babel">
const { useState, useRef, useEffect } = React;
const COLS = JSON.parse(document.getElementById('col-data').textContent);
const OPS = JSON.parse(document.getElementById('op-data').textContent);
const PRO_KEY = 'TES2025PRO';
const GUMROAD = 'https://tecnologiaexplicada.gumroad.com/l/prompts-brutales-pro';
const IS_PRO = false;

function getKey() {
  return null;
}

function clean(t) {
  return t
    .replace(/#{1,6}\s+/g,'')
    .replace(/\*\*([^*]+)\*\*/g,'$1')
    .replace(/\*([^*]+)\*/g,'$1')
    .replace(/---/g,'\u2014')
    .replace(/\n{3,}/g,'\n\n')
    .trim();
}

function getOpening(p, colId) {
  var key = (colId==='07' && p.nombre==='ESCUDO') ? 'ESCUDO_FIN' : p.nombre;
  return OPS[key] || ('Cuéntame qué necesitas y empezamos.');
}

var BLU='#4FC3F7', CA='rgba(255,255,255,0.03)', CB='rgba(255,255,255,0.07)',
    BLU3='rgba(79,195,247,0.05)', BLUB='rgba(79,195,247,0.2)',
    T1='rgba(255,255,255,0.85)', T2='rgba(255,255,255,0.65)', T3='rgba(255,255,255,0.45)';

function App() {
  const [view,setView] = useState('intro');
  const [activeCol,setActiveCol] = useState(null);
  const [activePrompt,setActivePrompt] = useState(null);
  const [isPro,setIsPro] = useState(() => {
    if(IS_PRO) return true;
    try{return localStorage.getItem('pb_pro')==='true';}catch(e){return false;}
  });
  const [modal,setModal] = useState(null);
  const [keyInput,setKeyInput] = useState('');
  const [keyError,setKeyError] = useState(false);
  const [chatOpen,setChatOpen] = useState(false);
  const [chatPrompt,setChatPrompt] = useState(null);
  const [chatColId,setChatColId] = useState(null);
  const [chatMsgs,setChatMsgs] = useState([]);
  const [chatInput,setChatInput] = useState('');
  const [chatLoading,setChatLoading] = useState(false);
  const [copied,setCopied] = useState(null);
  const msgsEnd = useRef(null);

  useEffect(()=>{msgsEnd.current&&msgsEnd.current.scrollIntoView({behavior:'smooth'});},[chatMsgs,chatLoading]);

  useEffect(()=>{
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      const el=document.getElementById('loading');
      if(el){el.style.opacity='0';el.style.transition='opacity 0.4s';setTimeout(()=>{if(el.parentNode)el.parentNode.removeChild(el);},400);}
    }));
  },[]);

  function activatePro(){
    setIsPro(true);
    try{localStorage.setItem('pb_pro','true');}catch(e){}
    setModal(null);setKeyInput('');setKeyError(false);
  }

  function checkKey(){
    if(keyInput.trim().toUpperCase()===PRO_KEY) activatePro();
    else setKeyError(true);
  }

  function copyText(texto,id){
    navigator.clipboard.writeText(texto);
    setCopied(id);
    setTimeout(()=>setCopied(null),2000);
  }

  function openChat(p,colId){
    setChatPrompt(p);setChatColId(colId);
    setChatMsgs([{role:'agent',content:getOpening(p,colId)}]);
    setChatOpen(true);
  }

  async function sendChat(){
    if(!chatInput.trim()||chatLoading) return;
    const msg=chatInput.trim();
    setChatInput('');
    const newMsgs=[...chatMsgs,{role:'user',content:msg}];
    setChatMsgs(newMsgs);setChatLoading(true);
    const apiKey=getKey();
    if(!apiKey){
      setChatMsgs(p=>[...p,{role:'agent',content:'Chat disponible solo en la versión Pro.'}]);
      setChatLoading(false);return;
    }
    try{
      const res=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
        body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,system:chatPrompt.texto,
          messages:newMsgs.map(m=>({role:m.role==='agent'?'assistant':'user',content:m.content}))})
      });
      const data=await res.json();
      const reply=clean(data.content&&data.content[0]?data.content[0].text:'Error.');
      setChatMsgs(p=>[...p,{role:'agent',content:reply}]);
    }catch(e){
      setChatMsgs(p=>[...p,{role:'agent',content:'Error de conexión. Inténtalo de nuevo.'}]);
    }
    setChatLoading(false);
  }

  function ModalOverlay(){
    if(modal!=='unlock') return null;
    return(
      <div onClick={()=>setModal(null)} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.88)',backdropFilter:'blur(8px)',zIndex:300,display:'flex',alignItems:'flex-end',justifyContent:'center'}}>
        <div onClick={e=>e.stopPropagation()} style={{background:'#0d0d0d',border:'1px solid rgba(255,255,255,0.1)',borderBottom:'none',borderRadius:'20px 20px 0 0',padding:'32px 24px 48px',width:'100%',maxWidth:480,display:'flex',flexDirection:'column',gap:18}}>
          <div style={{fontSize:22,fontWeight:800,letterSpacing:'-0.03em'}}>Desbloquea Agentes Brutales</div>
          <div style={{fontSize:14,color:T2,lineHeight:1.6}}>27 agentes desbloqueados + chat directo con cada uno. Pago único, sin suscripción.</div>
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {[['⚡','27 agentes desbloqueados'],['💬','Chat directo con cada agente'],['♾️','Sin límite de uso'],['📱','Instalable en iPhone y Android']].map(([icon,text])=>(
              <div key={text} style={{display:'flex',alignItems:'center',gap:10,fontSize:14,color:T2}}><span>{icon}</span><span>{text}</span></div>
            ))}
          </div>
          <button onClick={()=>window.open(GUMROAD,'_blank')} style={{background:BLU,color:'#000',border:'none',borderRadius:12,padding:'16px 20px',fontSize:16,fontWeight:800,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <span>Conseguir acceso — 19€</span>
            <span style={{fontSize:12,opacity:0.7}}>Pago único</span>
          </button>
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <div style={{flex:1,height:1,background:'rgba(255,255,255,0.08)'}}/><span style={{fontSize:12,color:T3,fontWeight:600}}>ya tengo clave</span><div style={{flex:1,height:1,background:'rgba(255,255,255,0.08)'}}/>
          </div>
          <div style={{display:'flex',gap:10}}>
            <input style={{flex:1,background:'rgba(255,255,255,0.05)',border:keyError?'1px solid #ff5252':'1px solid rgba(255,255,255,0.12)',borderRadius:10,padding:'12px 14px',color:'#fff',fontSize:14,outline:'none'}} placeholder="Pega tu clave aquí..." value={keyInput} onChange={e=>{setKeyInput(e.target.value);setKeyError(false);}} onKeyDown={e=>e.key==='Enter'&&checkKey()}/>
            <button onClick={checkKey} style={{background:'rgba(255,255,255,0.08)',color:'#fff',border:'1px solid rgba(255,255,255,0.12)',borderRadius:10,padding:'12px 16px',fontSize:14,fontWeight:700,cursor:'pointer'}}>Activar</button>
          </div>
          {keyError&&<div style={{fontSize:12,color:'#ff5252'}}>Clave incorrecta. Comprueba tu email.</div>}
          <button onClick={()=>setModal(null)} style={{background:'none',border:'none',color:T3,fontSize:14,cursor:'pointer',alignSelf:'center'}}>Cerrar</button>
        </div>
      </div>
    );
  }

  function ChatPanel(){
    if(!chatOpen||!chatPrompt) return null;
    return(
      <div style={{position:'fixed',bottom:0,right:0,width:'100%',maxWidth:480,height:580,background:'#080808',border:'1px solid rgba(79,195,247,0.18)',borderBottom:'none',borderRadius:'20px 20px 0 0',display:'flex',flexDirection:'column',zIndex:200,boxShadow:'0 -20px 60px rgba(0,0,0,0.7)'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'14px 18px',borderBottom:'1px solid rgba(255,255,255,0.06)',flexShrink:0}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <div style={{width:8,height:8,borderRadius:'50%',background:BLU,animation:'pulse 2s infinite'}}/>
            <span style={{fontSize:15,fontWeight:700}}>{chatPrompt.nombre} <span style={{color:BLU}}>·</span> <span style={{color:T3,fontWeight:500,fontSize:13}}>{chatPrompt.subtitulo}</span></span>
          </div>
          <button onClick={()=>setChatOpen(false)} style={{background:'rgba(255,255,255,0.06)',border:'none',color:T2,width:28,height:28,borderRadius:8,cursor:'pointer',fontSize:18,display:'flex',alignItems:'center',justifyContent:'center'}}>×</button>
        </div>
        <div style={{flex:1,overflowY:'auto',padding:16,display:'flex',flexDirection:'column',gap:10}}>
          {chatMsgs.map((m,i)=>(
            <div key={i} style={{maxWidth:'85%',padding:'11px 15px',borderRadius:m.role==='agent'?'4px 14px 14px 14px':'14px 14px 4px 14px',fontSize:14,lineHeight:1.55,background:m.role==='agent'?'rgba(79,195,247,0.07)':'rgba(255,255,255,0.06)',border:m.role==='agent'?'1px solid rgba(79,195,247,0.1)':'none',color:'rgba(255,255,255,0.85)',alignSelf:m.role==='agent'?'flex-start':'flex-end',wordBreak:'break-word',whiteSpace:'pre-wrap'}}>{m.content}</div>
          ))}
          {chatLoading&&(
            <div style={{maxWidth:'85%',padding:'14px 15px',borderRadius:'4px 14px 14px 14px',background:'rgba(79,195,247,0.07)',border:'1px solid rgba(79,195,247,0.1)',alignSelf:'flex-start',display:'flex',gap:4,alignItems:'center'}}>
              {[0,1,2].map(i=><div key={i} style={{width:6,height:6,borderRadius:'50%',background:BLU,animation:'typing 1.2s '+(i*0.2)+'s infinite'}}/>)}
            </div>
          )}
          <div ref={msgsEnd}/>
        </div>
        <div style={{padding:'10px 14px 16px',borderTop:'1px solid rgba(255,255,255,0.06)',display:'flex',gap:10,flexShrink:0}}>
          <textarea
            style={{flex:1,background:'rgba(255,255,255,0.05)',border:'1px solid rgba(255,255,255,0.1)',borderRadius:11,padding:'10px 14px',color:'#fff',fontSize:16,fontFamily:'inherit',resize:'none',outline:'none',minHeight:44,maxHeight:120}}
            placeholder={'Escribe a '+chatPrompt.nombre+'...'}
            value={chatInput}
            onChange={e=>setChatInput(e.target.value)}
            onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendChat();}}}
          />
          <button
            onClick={sendChat}
            disabled={!chatInput.trim()||chatLoading}
            style={{background:(!chatInput.trim()||chatLoading)?'rgba(79,195,247,0.2)':BLU,color:(!chatInput.trim()||chatLoading)?'rgba(0,0,0,0.3)':'#000',border:'none',borderRadius:11,width:44,height:44,fontSize:20,cursor:(!chatInput.trim()||chatLoading)?'not-allowed':'pointer',display:'flex',alignItems:'center',justifyContent:'center',alignSelf:'flex-end',flexShrink:0}}
          >↑</button>
        </div>
      </div>
    );
  }

  function Nav(){
    return(
      <div style={{position:'sticky',top:0,zIndex:100,background:'rgba(0,0,0,0.93)',backdropFilter:'blur(12px)',borderBottom:'1px solid rgba(255,255,255,0.06)',padding:'0 20px',display:'flex',alignItems:'center',justifyContent:'space-between',height:56}}>
        <div style={{display:'flex',alignItems:'center',gap:14}}>
          {view!=='cols'&&<button onClick={()=>{if(view==='detail'){setView('prompts');setActivePrompt(null);}else if(view==='prompts'){setView('cols');setActiveCol(null);}else{setView('cols');}}} style={{background:'none',border:'none',color:T2,fontSize:14,fontWeight:500,cursor:'pointer',display:'flex',alignItems:'center',gap:4}}>← Volver</button>}
          <span style={{fontSize:15,fontWeight:800,letterSpacing:'-0.02em'}}>Agentes <span style={{color:BLU}}>Brutales</span></span>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <button onClick={()=>setView('tes')} style={{background:'none',border:'1px solid rgba(255,255,255,0.1)',borderRadius:8,padding:'5px 11px',fontSize:12,fontWeight:600,color:T2,cursor:'pointer'}}>TES ↗</button>
          {isPro
            ?<div style={{background:'rgba(79,195,247,0.12)',border:'1px solid rgba(79,195,247,0.3)',borderRadius:8,padding:'5px 12px',fontSize:12,fontWeight:700,color:BLU}}>✓ PRO</div>
            :<button onClick={()=>setModal('unlock')} style={{background:BLU,color:'#000',border:'none',borderRadius:9,padding:'8px 14px',fontSize:13,fontWeight:800,cursor:'pointer'}}>Desbloquear — 19€</button>
          }
        </div>
      </div>
    );
  }

  if(view==='intro') return(
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'40px 24px',textAlign:'center'}}>
      <div style={{display:'inline-flex',alignItems:'center',gap:8,background:'rgba(79,195,247,0.1)',border:'1px solid rgba(79,195,247,0.3)',borderRadius:100,padding:'6px 16px',fontSize:12,fontWeight:700,color:BLU,letterSpacing:'0.08em',textTransform:'uppercase',marginBottom:32}}>⚡ Tecnología Explicada Simple</div>
      <div style={{fontSize:'clamp(52px,12vw,96px)',fontWeight:900,lineHeight:0.9,letterSpacing:'-0.04em',marginBottom:8}}>Agentes<br/><span style={{color:BLU}}>Brutales</span></div>
      <div style={{fontSize:'clamp(22px,5vw,40px)',fontWeight:900,letterSpacing:'-0.03em',color:'rgba(255,255,255,0.2)',marginBottom:40}}>Edición Completa</div>
      <p style={{maxWidth:500,fontSize:17,lineHeight:1.65,color:T2,marginBottom:12}}>No son prompts. Son agentes.</p>
      <p style={{maxWidth:500,fontSize:17,lineHeight:1.65,color:T2,marginBottom:40}}>Cada uno usa <strong style={{color:T1}}>métodos reales de coaching y psicología</strong> para ayudarte a conseguir resultados concretos.</p>
      <div style={{display:'flex',gap:44,marginBottom:40,flexWrap:'wrap',justifyContent:'center'}}>
        {[['27','Agentes'],['7','Colecciones'],['7','Gratis']].map(([n,l])=>(
          <div key={l+n} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
            <span style={{fontSize:40,fontWeight:900,color:BLU,letterSpacing:'-0.03em'}}>{n}</span>
            <span style={{fontSize:11,color:'rgba(255,255,255,0.35)',textTransform:'uppercase',letterSpacing:'0.1em',fontWeight:600}}>{l}</span>
          </div>
        ))}
      </div>
      <button onClick={()=>setView('cols')} style={{background:BLU,color:'#000',border:'none',borderRadius:12,padding:'16px 36px',fontSize:16,fontWeight:800,cursor:'pointer'}}>Explorar agentes →</button>
      <p style={{marginTop:16,fontSize:13,color:'rgba(255,255,255,0.35)'}}>7 gratis · Desbloquea los 27 por 19€</p>
    </div>
  );

  if(view==='cols') return(
    <div>
      <Nav/><ModalOverlay/>
      <div style={{maxWidth:880,margin:'0 auto',padding:'40px 20px 100px'}}>
        <div style={{fontSize:28,fontWeight:800,letterSpacing:'-0.03em',marginBottom:6}}>Colecciones</div>
        <div style={{fontSize:14,color:T2,marginBottom:32}}>{isPro?'27 agentes desbloqueados · Toca cualquier colección':'7 agentes gratis · 20 bloqueados · Desbloquea todo por 19€'}</div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(250px,1fr))',gap:14}}>
          {COLS.map(col=>(
            <div key={col.id} onClick={()=>{setActiveCol(col);setView('prompts');}}
              style={{background:CA,border:'1px solid '+CB,borderRadius:16,padding:22,cursor:'pointer',display:'flex',flexDirection:'column',gap:10,transition:'all 0.15s'}}
              onMouseEnter={e=>{e.currentTarget.style.background=BLU3;e.currentTarget.style.borderColor=BLUB;}}
              onMouseLeave={e=>{e.currentTarget.style.background=CA;e.currentTarget.style.borderColor=CB;}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                <span style={{fontSize:11,fontWeight:700,color:BLU,letterSpacing:'0.1em',textTransform:'uppercase'}}>Colección {col.id}</span>
                <span style={{fontSize:26}}>{col.icono}</span>
              </div>
              <div style={{fontSize:17,fontWeight:700,letterSpacing:'-0.02em',lineHeight:1.2}}>{col.nombre}</div>
              <div style={{fontSize:13,color:T2,lineHeight:1.55,flex:1}}>{col.descripcion}</div>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',paddingTop:12,borderTop:'1px solid rgba(255,255,255,0.06)'}}>
                <span style={{fontSize:12,color:T3,fontWeight:500}}>{col.prompts.length} agentes</span>
                {!isPro&&<span style={{fontSize:12,color:BLU,fontWeight:600}}>{col.prompts.filter(p=>p.free).length} gratis</span>}
                <span style={{color:'rgba(79,195,247,0.6)',fontSize:16}}>→</span>
              </div>
            </div>
          ))}
        </div>
      </div>
      <ChatPanel/>
    </div>
  );

  if(view==='prompts'&&activeCol) return(
    <div>
      <Nav/><ModalOverlay/>
      <div style={{maxWidth:880,margin:'0 auto',padding:'40px 20px 100px'}}>
        <div style={{display:'inline-flex',alignItems:'center',gap:6,background:'rgba(79,195,247,0.08)',border:'1px solid rgba(79,195,247,0.18)',borderRadius:100,padding:'4px 12px',fontSize:11,fontWeight:700,color:BLU,letterSpacing:'0.08em',marginBottom:12}}>{activeCol.icono} Colección {activeCol.id}</div>
        <div style={{fontSize:28,fontWeight:800,letterSpacing:'-0.03em',marginBottom:6}}>{activeCol.nombre}</div>
        <div style={{fontSize:14,color:T2,marginBottom:32}}>{activeCol.descripcion}</div>
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          {activeCol.prompts.map((p,i)=>{
            const locked=!isPro&&!p.free;
            return(
              <div key={p.nombre} onClick={()=>{if(locked){setModal('unlock');return;}setActivePrompt(p);setView('detail');}}
                style={{background:locked?'rgba(255,255,255,0.015)':CA,border:'1px solid '+(locked?'rgba(255,255,255,0.04)':CB),borderRadius:13,padding:'18px 22px',cursor:'pointer',display:'flex',alignItems:'center',gap:18,opacity:locked?0.75:1,transition:'all 0.15s'}}
                onMouseEnter={e=>{if(!locked){e.currentTarget.style.background=BLU3;e.currentTarget.style.borderColor=BLUB;}}}
                onMouseLeave={e=>{e.currentTarget.style.background=locked?'rgba(255,255,255,0.015)':CA;e.currentTarget.style.borderColor=locked?'rgba(255,255,255,0.04)':CB;}}>
                <div style={{fontSize:11,fontWeight:700,color:BLU,width:26,flexShrink:0}}>{String(i+1).padStart(2,'0')}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:15,fontWeight:700,letterSpacing:'-0.01em',marginBottom:2}}>
                    {p.nombre}
                    {p.free&&!isPro&&<span style={{fontSize:10,fontWeight:700,color:BLU,background:'rgba(79,195,247,0.1)',borderRadius:6,padding:'2px 7px',marginLeft:8,letterSpacing:'0.06em'}}>GRATIS</span>}
                  </div>
                  <div style={{fontSize:12,color:T2,fontWeight:500}}>{p.subtitulo}</div>
                </div>
                {locked?<span style={{fontSize:16,flexShrink:0}}>🔒</span>:<span style={{color:'rgba(79,195,247,0.5)',fontSize:16}}>→</span>}
              </div>
            );
          })}
        </div>
      </div>
      <ChatPanel/>
    </div>
  );

  if(view==='detail'&&activePrompt) return(
    <div>
      <Nav/><ModalOverlay/>
      <div style={{maxWidth:880,margin:'0 auto',padding:'40px 20px 100px'}}>
        <div style={{maxWidth:680}}>
          {activeCol&&<div style={{display:'inline-flex',alignItems:'center',gap:6,background:'rgba(79,195,247,0.07)',border:'1px solid rgba(79,195,247,0.18)',borderRadius:100,padding:'4px 12px',fontSize:11,fontWeight:700,color:BLU,letterSpacing:'0.08em',marginBottom:16}}>{activeCol.icono} {activeCol.nombre}</div>}
          <div style={{fontSize:'clamp(40px,9vw,64px)',fontWeight:900,letterSpacing:'-0.04em',lineHeight:0.92,color:BLU,marginBottom:10}}>{activePrompt.nombre}</div>
          <div style={{fontSize:18,fontWeight:600,color:'rgba(255,255,255,0.75)',marginBottom:6}}>{activePrompt.subtitulo}</div>
          <div style={{fontSize:15,color:T2,fontStyle:'italic',marginBottom:32}}>"{activePrompt.tagline}"</div>
          <div style={{background:'rgba(79,195,247,0.03)',border:'1px solid rgba(79,195,247,0.12)',borderRadius:16,overflow:'hidden',marginBottom:16}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'13px 20px',borderBottom:'1px solid rgba(79,195,247,0.08)',background:'rgba(79,195,247,0.04)'}}>
              <span style={{fontSize:11,fontWeight:700,color:BLU,letterSpacing:'0.1em',textTransform:'uppercase'}}>Las instrucciones</span>
              <button onClick={()=>copyText(activePrompt.texto,activePrompt.nombre)} style={{display:'flex',alignItems:'center',gap:6,background:copied===activePrompt.nombre?'#4caf50':BLU,color:copied===activePrompt.nombre?'#fff':'#000',border:'none',borderRadius:8,padding:'7px 14px',fontSize:12,fontWeight:700,cursor:'pointer'}}>{copied===activePrompt.nombre?'✓ Copiadas':'⎘ Copiar instrucciones'}</button>
            </div>
            <div style={{padding:22,fontSize:14,lineHeight:1.75,color:'rgba(255,255,255,0.72)',whiteSpace:'pre-wrap'}}>{activePrompt.texto}</div>
          </div>
          {isPro ? (
            <div style={{display:'flex',flexDirection:'column',gap:10}}>
              <div style={{fontSize:13,fontWeight:600,color:T2,marginBottom:2}}>Usar {activePrompt.nombre} con tu IA favorita</div>
              {[
                {name:'Claude',emoji:'🔵',url:'https://claude.ai/new?q=',bg:'rgba(204,120,92,0.12)',border:'rgba(204,120,92,0.35)'},
                {name:'ChatGPT',emoji:'🟢',url:'https://chatgpt.com/?q=',bg:'rgba(16,163,127,0.1)',border:'rgba(16,163,127,0.35)'},
                {name:'Grok',emoji:'⚫',url:'https://x.com/i/grok?text=',bg:'rgba(255,255,255,0.04)',border:'rgba(255,255,255,0.15)'},
              ].map(ai=>(
                <button key={ai.name} onClick={()=>window.open(ai.url+encodeURIComponent(activePrompt.texto),'_blank')} style={{display:'flex',alignItems:'center',gap:14,width:'100%',background:ai.bg,border:'1px solid '+ai.border,borderRadius:13,padding:'15px 20px',cursor:'pointer',textAlign:'left',color:'#fff'}}>
                  <span style={{fontSize:20,flexShrink:0}}>{ai.emoji}</span>
                  <div style={{flex:1}}>
                    <div style={{fontSize:15,fontWeight:700}}>Abrir en {ai.name}</div>
                    <div style={{fontSize:12,color:T2,marginTop:2}}>El agente ya viene configurado</div>
                  </div>
                  <span style={{fontSize:14,color:T3}}>↗</span>
                </button>
              ))}
            </div>
          ) : (
            <button onClick={()=>setModal('unlock')} style={{display:'flex',alignItems:'center',gap:12,width:'100%',background:'rgba(255,255,255,0.02)',border:'1px solid rgba(255,255,255,0.07)',borderRadius:13,padding:'18px 22px',cursor:'pointer',textAlign:'left',color:T3}}>
              <span style={{fontSize:22,flexShrink:0}}>🔒</span>
              <div>
                <div style={{fontSize:15,fontWeight:700,marginBottom:3,color:'rgba(255,255,255,0.6)'}}>Usar {activePrompt.nombre} con tu IA</div>
                <div style={{fontSize:12}}>Disponible en Pro — desbloquea por 19€</div>
              </div>
            </button>
          )}
        </div>
      </div>
      <ChatPanel/>
    </div>
  );

  if(view==='tes') return(
    <div>
      <Nav/>
      <div style={{maxWidth:880,margin:'0 auto',padding:'40px 20px 100px'}}>
        <div style={{fontSize:28,fontWeight:800,letterSpacing:'-0.03em',marginBottom:6}}>Tecnología Explicada Simple</div>
        <div style={{fontSize:14,color:T2,marginBottom:40}}>Todo el contenido gratuito — en el canal que prefieras.</div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(220px,1fr))',gap:14}}>
          {[
            {icon:'🌐',name:'Web TES',sub:'tecnologiaexplicadasimple.com',url:'https://tecnologiaexplicadasimple.com',color:BLU},
            {icon:'▶️',name:'YouTube',sub:'@Tecnologia.Explicada.Simple',url:'https://www.youtube.com/@Tecnologia.Explicada.Simple',color:'#ff4444'},
            {icon:'📸',name:'Instagram',sub:'@tecnologia.explicada.simple',url:'https://www.instagram.com/tecnologia.explicada.simple',color:'#e1306c'},
            {icon:'🎵',name:'TikTok',sub:'@techexplicadasimple',url:'https://www.tiktok.com/@techexplicadasimple',color:'#69c9d0'}
          ].map(item=>(
            <a key={item.name} href={item.url} target="_blank" rel="noopener noreferrer"
              style={{background:CA,border:'1px solid '+CB,borderRadius:16,padding:24,display:'flex',flexDirection:'column',gap:12,textDecoration:'none',color:'#fff'}}
              onMouseEnter={e=>{e.currentTarget.style.background='rgba(255,255,255,0.06)';e.currentTarget.style.borderColor='rgba(255,255,255,0.14)';}}
              onMouseLeave={e=>{e.currentTarget.style.background=CA;e.currentTarget.style.borderColor=CB;}}>
              <span style={{fontSize:32}}>{item.icon}</span>
              <div>
                <div style={{fontSize:17,fontWeight:700,letterSpacing:'-0.02em',marginBottom:4}}>{item.name}</div>
                <div style={{fontSize:12,color:T3}}>{item.sub}</div>
              </div>
              <div style={{fontSize:13,color:item.color,fontWeight:600,marginTop:'auto'}}>Visitar →</div>
            </a>
          ))}
        </div>
        <div style={{marginTop:48,padding:24,background:'rgba(79,195,247,0.04)',border:'1px solid rgba(79,195,247,0.12)',borderRadius:16}}>
          <div style={{fontSize:15,fontWeight:700,marginBottom:8}}>¿Feedback sobre Agentes Brutales?</div>
          <div style={{fontSize:14,color:T2,marginBottom:16}}>Escríbenos por Instagram o deja un comentario en YouTube.</div>
          <a href="https://www.instagram.com/tecnologia.explicada.simple" target="_blank" rel="noopener noreferrer" style={{display:'inline-flex',alignItems:'center',gap:8,background:BLU,color:'#000',borderRadius:10,padding:'10px 20px',fontSize:13,fontWeight:700,textDecoration:'none'}}>Contactar por Instagram →</a>
        </div>
      </div>
    </div>
  );

  return null;
}

ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>
</body>
</html>
