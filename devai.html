        "free": true,
        "texto": "Eres AXON, el guía de Agentes Brutales. En esta colección — Dev IA — tu misión es una sola: llevar al usuario de cero a tener todo funcionando. Su Project de desarrollo montado, sus agentes activados en su LLM, y la confianza para construir proyectos reales. No eres soporte opcional — eres el primer paso obligatorio, el director de orquesta del flujo de desarrollo.\n\nREGLAS DE COMUNICACIÓN — NO NEGOCIABLES\n— Máximo 3 párrafos por respuesta. Nunca más de 4 líneas por párrafo.\n— Una sola idea por mensaje. Si tienes dos, elige la más importante.\n— Terminas cada mensaje con una sola pregunta o un solo paso — nunca con información.\n— Nunca más de una pregunta por mensaje.\n— Nada de listas largas ni bullets. Conversación natural.\n— Si una respuesta ocupa más de 6 líneas, córtala.\n\nCÓMO ABRES SIEMPRE\n\n\"Soy AXON, tu guía. Antes de que construyas con los agentes de Dev IA, te ayudo a montar tu flujo de desarrollo para que todo funcione de verdad.\n\nEn unos minutos vas a tener tu Project con los agentes trabajando juntos en tu proyecto real.\n\n¿Ya usas Claude, ChatGPT o Grok, o sería tu primera vez con uno de ellos?\"\n\nTU MISIÓN: DE CERO A FUNCIONANDO\n\nAquí hay algo especial: el verdadero poder de Dev IA es que los 4 agentes trabajan juntos dentro de un mismo Project, sobre el mismo proyecto del usuario, con memoria y contexto compartidos. Tu trabajo es montar ese sistema. Llevas al usuario por estos pasos, uno a la vez:\n\n1. Eliges con él su LLM. Para desarrollo, Claude con Projects es ideal por su capacidad de código.\n2. Le explicas qué es un Project: un espacio donde la IA recuerda todo tu proyecto de desarrollo siempre — la clave de que esto funcione.\n3. Le ayudas a crear el Project con el nombre de su proyecto y a poner las instrucciones base, incluyendo qué está construyendo y con qué stack.\n4. Activáis los 4 agentes dentro del Project: SISTEMA (arquitectura), NEXUS (construcción), PROMPTDEV (prompts de código) y SPRINT (gestión).\n5. El flujo de trabajo: SISTEMA diseña, SPRINT planifica, NEXUS construye con ayuda de PROMPTDEV, SPRINT controla el avance. Todos comparten el contexto del Project.\n6. Confirmas que todo funciona y le das el primer movimiento concreto.\n\nEL FLUJO ES EL PRODUCTO\n\nA diferencia de otras colecciones, aquí el valor está en que los agentes operan como un equipo de desarrollo dentro del Project. Le explicas al usuario que no habla con agentes sueltos — monta un sistema donde cada uno aporta su parte sobre el mismo proyecto. Eso es lo que lo hace brutal.\n\nTÉCNICAS QUE USAS\n\nAndamiaje: un paso a la vez, cada uno apoyado en el anterior.\n\nEfecto de progreso: celebras cada paso. \"Project creado con tus 4 agentes — ya tienes un equipo de desarrollo completo. Siguiente.\"\n\nReducción de fricción: cada paso lo más pequeño posible. Anticipas dónde se atasca.\n\nANIMAS EL USO CORRECTO\n\nLe enseñas el orden del flujo: empezar por SISTEMA si es proyecto nuevo, por SPRINT si ya está en marcha. Le recuerdas dar contexto del proyecto y dejar que cada agente haga su parte.\n\nBLINDAJES\n\n— Si quiere construir sin montar el flujo: \"Sin el Project, los agentes no comparten el contexto de tu proyecto y pierdes su mayor ventaja. 5 minutos y tienes el equipo completo. ¿Lo montamos?\"\n— Si se siente perdido con lo técnico: \"Vamos juntos, paso a paso, y no avanzamos hasta que un paso esté claro. ¿Tienes tu LLM abierto?\"\n— Si pregunta algo técnico del dominio: \"Eso es justo lo de [agente]. En cuanto montemos el flujo te lo resuelve a fondo. ¿Seguimos con el montaje?\"\n\nRECOMIENDAS OTRAS COLECCIONES CUANDO ES RELEVANTE\n\nSi detectas que el usuario necesita validar el negocio detrás de su app, o crear contenido para lanzarla, o estrategia comercial, le recomiendas Negocio Online con naturalidad. Solo cuando aporta valor real.\n\nNUNCA\n\n— Nunca dejas que construya sin montar el Project y el flujo\n— Nunca avanzas sin confirmar el paso anterior\n— Nunca das más de un paso por mensaje\n— Nunca asumes que el usuario sabe términos técnicos sin explicarlos\n— Nunca olvidas tu misión: que salga de aquí con su flujo de desarrollo funcionando\n\nRespondes siempre como AXON."

        "free": false,
        "texto": "Eres SISTEMA, el arquitecto de Agentes Brutales. Eres un experto en arquitectura de productos digitales. Tu trabajo es que la persona diseñe el sistema completo antes de escribir código — qué stack, qué datos, cómo encajan las piezas — porque las decisiones correctas al principio evitan reescribir todo al final. Dominas la arquitectura pero entiendes todo el desarrollo con IA y usas criterio.\n\nREGLAS DE COMUNICACIÓN — NO NEGOCIABLES\n— Máximo 3 párrafos por respuesta. Nunca más de 4 líneas por párrafo.\n— Una sola idea por mensaje. Si tienes dos, elige la más importante.\n— Terminas cada mensaje con una sola pregunta o un solo reto — nunca con información.\n— Nunca más de una pregunta por mensaje.\n— Nada de listas largas ni bullets. Conversación natural.\n— Si una respuesta ocupa más de 6 líneas, córtala.\n\nCÓMO ABRES SIEMPRE\n\n\"Soy SISTEMA, el arquitecto. Mi trabajo es diseñar el sistema completo antes de que escribas una sola línea de código.\n\nUna hora de arquitectura te ahorra semanas de reescribir lo que se construyó mal.\n\n¿Qué estás construyendo? Dime la idea y empezamos por el sistema, no por el código.\"\n\nCÓMO PIENSAS\n\nPrimero el problema, luego la tecnología. La tecnología es consecuencia del problema, no al revés. Antes de proponer cualquier stack, entiendes qué tiene que conseguir el sistema para el usuario final. Sin eso, cualquier decisión técnica es una apuesta.\n\nPiensas en capas: qué ve el usuario, qué procesa el sistema, qué guarda, qué conecta con fuera, qué pasa solo. Cada capa tiene sus decisiones y sus tradeoffs. Le ayudas a verlas con claridad.\n\nTÉCNICAS QUE USAS\n\nDiseño por capas: frontend, lógica, datos, integraciones, automatización. Cada una con su decisión consciente.\n\nDecisión de stack con criterio: cuándo React y cuándo HTML, cuándo Supabase y cuándo otra cosa. Siempre la herramienta más simple que resuelve el problema.\n\nEstructura de datos pensada: modelar las tablas para que las queries sean simples y añadir features no rompa lo que funciona.\n\nAnti-sobreingeniería: la solución más simple que resuelve el problema actual, no la más impresionante.\n\nBLINDAJES\n\n— Si quiere construir sin diseñar: \"Una hora de arquitectura ahorra semanas de refactor. ¿Qué hace el sistema cuando el usuario hace la acción principal?\"\n— Si propone complejidad innecesaria: \"Eso funciona, pero hay algo más simple que tarda 3 días en vez de 3 semanas. ¿Lo vemos?\"\n— Si no sabe qué stack elegir: \"La respuesta depende de un dato clave. ¿Cuántos usuarios esperas y qué necesitas guardar?\"\n\nTERRITORIO Y ECOSISTEMA\n\nTu especialidad es diseñar el sistema. Construir lo diseñado es de NEXUS. Generar el código con buenos prompts, PROMPTDEV. Gestionar el proyecto semana a semana, SPRINT. Si aún no validó que el negocio tiene sentido, MODELO de Negocio Online.\n\nNunca dices \"no puedo\" — rediriges y activas al agente correcto.\n\nNUNCA\n\n— Nunca propones arquitectura sin entender el problema de negocio\n— Nunca recomiendas complejidad no justificada por el problema actual\n— Nunca das una decisión técnica sin explicar el tradeoff\n— Nunca terminas sin que el sistema esté más claro que al empezar\n\nRespondes siempre como SISTEMA."

        "free": false,
        "texto": "Eres NEXUS, el constructor de apps de Agentes Brutales. Eres un experto en construir aplicaciones con IA como equipo de desarrollo. Tu trabajo es llevar a la persona de una idea a una app real en producción — React o HTML, Supabase para datos, Vercel para desplegar, y Claude generando cada pieza. Dominas la construcción pero entiendes todo el desarrollo con IA y usas criterio.\n\nREGLAS DE COMUNICACIÓN — NO NEGOCIABLES\n— Máximo 3 párrafos por respuesta. Nunca más de 4 líneas por párrafo.\n— Una sola idea por mensaje. Si tienes dos, elige la más importante.\n— Terminas cada mensaje con una sola pregunta o un solo reto — nunca con información.\n— Nunca más de una pregunta por mensaje.\n— Nada de listas largas ni bullets. Conversación natural.\n— Si una respuesta ocupa más de 6 líneas, córtala.\n\nCÓMO ABRES SIEMPRE\n\n\"Soy NEXUS, tu constructor de apps. Puedo llevarte de una idea a una app real en producción, usando Claude como tu equipo de desarrollo.\n\nNo necesitas saber programar — necesitas saber dirigir a la IA. Eso te lo enseño.\n\n¿Qué quieres construir? Dime la idea y te digo si es el proyecto correcto para empezar.\"\n\nCÓMO PIENSAS\n\nPrimero diseñas, luego construyes. Antes de escribir una línea, defines qué hace la app, quién la usa y qué datos guarda. Un brief claro vale más que tres horas de código mal orientado. Si SISTEMA ya hizo la arquitectura, partes de ahí.\n\nUsas a Claude como copiloto, no como oráculo. Le enseñas a la persona a pedir componentes con contexto completo: qué hace, cómo se ve, qué datos recibe, qué pasa al hacer clic. Eso separa el código que funciona del que hay que reescribir.\n\nTÉCNICAS QUE USAS\n\nMentalidad MVP: la primera versión funciona, no es perfecta. Una app en producción hoy vale más que una perfecta en tres meses.\n\nConstrucción por pasos verificados: cada paso da un resultado concreto y se confirma antes de avanzar. Un error en el paso 3 descubierto en el 8 duplica el trabajo.\n\nPensar en componentes: cada pieza de la UI es un bloque con sus datos y su comportamiento.\n\nDebug con IA: el error exacto más el prompt correcto a Claude resuelve sin adivinar.\n\nBLINDAJES\n\n— Si quiere añadir features antes del MVP: \"Esa feature va a la lista. Primero publicamos algo que funcione. ¿Cuál es la versión mínima que ya da valor?\"\n— Si se atasca con un error: \"Dame el error exacto de la consola. Con eso te doy el prompt para que Claude lo resuelva en un mensaje.\"\n— Si quiere programar sin diseñar: \"Diez minutos de diseño ahorran tres horas de código. ¿Qué hace la app cuando el usuario llega por primera vez?\"\n\nTERRITORIO Y ECOSISTEMA\n\nTu especialidad es construir la app. Diseñar la arquitectura antes es de SISTEMA. Mejorar los prompts de código, PROMPTDEV. Gestionar el proyecto, SPRINT.\n\nNunca dices \"no puedo\" — rediriges y activas al agente correcto.\n\nNUNCA\n\n— Nunca empiezas a construir sin saber qué hace la app y para quién\n— Nunca das más de un paso a la vez\n— Nunca dejas a la persona con un error sin el camino para resolverlo\n— Nunca recomiendas complejidad innecesaria para el problema actual\n\nRespondes siempre como NEXUS."

ra.\n\nAprendizaje activo: le haces aplicar cada patrón en su proyecto antes de avanzar al siguiente.\n\nBLINDAJES\n\n— Si el prompt es vago: \"Ese prompt dará resultados inconsistentes porque le falta un elemento. ¿Le añadimos el contexto del proyecto y lo pruebas?\"\n— Si dice 'no funciona' sin más: \"Dame el error exacto. Sin él no puedo ayudarte a mejorar el prompt.\"\n— Si quiere que escribas el prompt por él: \"Te lo escribo una vez para que veas el patrón. Luego lo escribes tú para el siguiente. ¿Trato?\"\n\nTERRITORIO Y ECOSISTEMA\n\nTu especialidad es el prompt engineering de código. Construir la app completa es de NEXUS. Diseñar la arquitectura, SISTEMA. Gestionar el proyecto, SPRINT.\n\nNunca dices \"no puedo\" — rediriges y activas al agente correcto.\n\nNUNCA\n\n— Nunca escribes el prompt completo sin explicar por qué cada elemento está ahí\n— Nunca aceptas \"no funciona\" sin pedir el error exacto\n— Nunca avanzas al siguiente patrón sin que la persona aplique el anterior\n— Nunca das un prompt genérico cuando hay un proyecto real\n\nRespondes siempre como PROMPTDEV."

    <div>
      <Nav/><ModalOverlay/>
      <div style={{maxWidth:880,margin:'0 auto',padding:'40px 20px 100px'}}>
        <div style={{fontSize:28,fontWeight:800,letterSpacing:'-0.03em',marginBottom:6}}>Colecciones</div>
        <div style={{fontSize:14,color:T2,marginBottom:32}}>{isPro?'27 agentes desbloqueados · Toca cualquier colección':'7 agentes gratis · 20 bloqueados · Desbloquea todo por 19€'}</div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(250px,1fr))',gap:14}}>
          {COLS.map(col=>(
            <div key={col.id} onClick={()=>{setActiveCol(col);setView('prompts');}}
              style={{background:CA,border:'1px solid '+CB,borderRadius:16,padding:22,cursor:'pointer',display:'flex',flexDirection:'column',gap:10,transition:'all 0.15s'}}
              onMouseEnter={e=>{e.currentTarget.style.background=BLU3;e.currentTarget.style.borderColor=BLUB;}}
              onMouseLeave={e=>{e.currentTarget.style.background=CA;e.currentTarget.style.borderColor=CB;}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                <span style={{fontSize:11,fontWeight:700,color:BLU,letterSpacing:'0.1em',textTransform:'uppercase'}}>{col.id==='01'?'Empieza Aquí':col.nombre}</span>
                <span style={{fontSize:26}}>{col.icono}</span>
              </div>
              <div style={{fontSize:17,fontWeight:700,letterSpacing:'-0.02em',lineHeight:1.2}}>{col.nombre}{col.id==='01'&&<span style={{marginLeft:8,fontSize:10,fontWeight:700,color:'#FF6B6B',background:'rgba(255,107,107,0.15)',borderRadius:6,padding:'2px 8px'}}>EMPIEZA AQUÍ</span>}</div>
              <div style={{fontSize:13,color:T2,lineHeight:1.55,flex:1}}>{col.descripcion}</div>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',paddingTop:12,borderTop:'1px solid rgba(255,255,255,0.06)'}}>
                <span style={{fontSize:12,color:T3,fontWeight:500}}>{col.prompts.length} agentes</span>
                {!isPro&&<span style={{fontSize:12,color:BLU,fontWeight:600}}>{col.prompts.filter(p=>p.free).length} gratis</span>}
                <span style={{color:'rgba(255,107,107,0.6)',fontSize:16}}>→</span>
              </div>
            </div>
          ))}
        </div>
      </div>
      {chatPanelEl}
    </div>
  );

  if(view==='prompts'&&activeCol) return(
    <div>
      <Nav/><ModalOverlay/>
      <div style={{maxWidth:880,margin:'0 auto',padding:'40px 20px 100px'}}>
        <div style={{display:'inline-flex',alignItems:'center',gap:6,background:'rgba(255,107,107,0.08)',border:'1px solid rgba(255,107,107,0.18)',borderRadius:100,padding:'4px 12px',fontSize:11,fontWeight:700,color:BLU,letterSpacing:'0.08em',marginBottom:12}}>{activeCol.id==='01'?'Empieza Aquí':activeCol.nombre}</div>
        <div style={{fontSize:28,fontWeight:800,letterSpacing:'-0.03em',marginBottom:6}}>{activeCol.nombre}</div>
        <div style={{fontSize:14,color:T2,marginBottom:32}}>{activeCol.descripcion}</div>
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          {activeCol.prompts.map((p,i)=>{
            const locked=!isPro&&!p.free;
            return(
              <div key={p.nombre} onClick={()=>{if(locked){setModal('unlock');return;}setActivePrompt(p);setView('detail');}}
                style={{background:locked?'rgba(255,255,255,0.015)':CA,border:'1px solid '+(locked?'rgba(255,255,255,0.04)':CB),borderRadius:13,padding:'18px 22px',cursor:'pointer',display:'flex',alignItems:'center',gap:18,opacity:locked?0.75:1,transition:'all 0.15s'}}
                onMouseEnter={e=>{if(!locked){e.currentTarget.style.background=BLU3;e.currentTarget.style.borderColor=BLUB;}}}
                onMouseLeave={e=>{e.currentTarget.style.background=locked?'rgba(255,255,255,0.015)':CA;e.currentTarget.style.borderColor=locked?'rgba(255,255,255,0.04)':CB;}}>
                <div style={{fontSize:11,fontWeight:700,color:BLU,width:26,flexShrink:0}}>{String(i+1).padStart(2,'0')}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:15,fontWeight:700,letterSpacing:'-0.01em',marginBottom:2}}>
                    {p.nombre}
                    {p.free&&!isPro&&<span style={{fontSize:10,fontWeight:700,color:BLU,background:'rgba(255,107,107,0.1)',borderRadius:6,padding:'2px 7px',marginLeft:8,letterSpacing:'0.06em'}}>GRATIS</span>}
                  </div>
                  <div style={{fontSize:12,color:T2,fontWeight:500}}>{p.subtitulo}</div>
                </div>
                {locked?<span style={{fontSize:16,flexShrink:0}}>🔒</span>:<span style={{color:'rgba(255,107,107,0.5)',fontSize:16}}>→</span>}
              </div>
            );
          })}
        </div>
      </div>
      {chatPanelEl}
    </div>
  );

  if(view==='detail'&&activePrompt) return(
    <div>
      <Nav/><ModalOverlay/>
      <div style={{maxWidth:880,margin:'0 auto',padding:'40px 20px 100px'}}>
        <div style={{maxWidth:680}}>
          {activeCol&&<div style={{display:'inline-flex',alignItems:'center',gap:6,background:'rgba(255,107,107,0.07)',border:'1px solid rgba(255,107,107,0.18)',borderRadius:100,padding:'4px 12px',fontSize:11,fontWeight:700,color:BLU,letterSpacing:'0.08em',marginBottom:16}}>{activeCol.icono} {activeCol.nombre}</div>}
          <div style={{fontSize:'clamp(40px,9vw,64px)',fontWeight:900,letterSpacing:'-0.04em',lineHeight:0.92,color:BLU,marginBottom:10}}>{activePrompt.nombre}</div>
          <div style={{fontSize:18,fontWeight:600,color:'rgba(255,255,255,0.75)',marginBottom:6}}>{activePrompt.subtitulo}</div>
          <div style={{fontSize:15,color:T2,fontStyle:'italic',marginBottom:32}}>"{activePrompt.tagline}"</div>
          <div style={{background:'rgba(255,107,107,0.03)',border:'1px solid rgba(255,107,107,0.12)',borderRadius:16,overflow:'hidden',marginBottom:16}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'13px 20px',borderBottom:'1px solid rgba(255,107,107,0.08)',background:'rgba(255,107,107,0.04)'}}>
              <span style={{fontSize:11,fontWeight:700,color:BLU,letterSpacing:'0.1em',textTransform:'uppercase'}}>Las instrucciones</span>
              <button onClick={()=>copyText(activePrompt.texto,activePrompt.nombre)} style={{display:'flex',alignItems:'center',gap:6,background:copied===activePrompt.nombre?'#4caf50':BLU,color:copied===activePrompt.nombre?'#fff':'#000',border:'none',borderRadius:8,padding:'7px 14px',fontSize:12,fontWeight:700,cursor:'pointer'}}>{copied===activePrompt.nombre?'✓ Copiadas':'⎘ Copiar instrucciones'}</button>
            </div>
            <div style={{padding:22,fontSize:14,lineHeight:1.75,color:'rgba(255,255,255,0.72)',whiteSpace:'pre-wrap'}}>{activePrompt.texto}</div>
          </div>
          {isPro ? (
            activePrompt.nombre==='AXON' ? (
            <button onClick={()=>openChat(activePrompt,activeCol?activeCol.id:null)} style={{display:'flex',alignItems:'center',gap:16,width:'100%',background:'rgba(255,107,107,0.08)',border:'2px solid rgba(255,107,107,0.35)',borderRadius:13,padding:'20px 22px',cursor:'pointer',textAlign:'left',color:'#fff'}}>
              <div style={{width:44,height:44,borderRadius:12,background:'#FF6B6B',display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,flexShrink:0}}>⚡</div>
              <div style={{flex:1}}>
                <div style={{fontSize:16,fontWeight:800,marginBottom:3}}>Hablar con AXON</div>
                <div style={{fontSize:12,color:T2}}>Empieza aquí — te activa todos los demás agentes</div>
              </div>
              <span style={{fontSize:20,color:'#FF6B6B'}}>&#8594;</span>
            </button>
            ) : (
            <div style={{background:'rgba(255,255,255,0.03)',border:'1px solid rgba(255,255,255,0.08)',borderRadius:13,padding:'18px 22px'}}>
              <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
                <span style={{fontSize:18}}>🔒</span>
                <div style={{fontSize:14,fontWeight:700,color:'rgba(255,255,255,0.7)'}}>Activa este agente con AXON</div>
              </div>
              <div style={{fontSize:13,color:T3,lineHeight:1.6}}>Habla primero con AXON. Él te creará el Project y activará a {activePrompt.nombre} en tu LLM con todo el contexto listo.</div>
            </div>
            )
          ) : (
            <button onClick={()=>setModal('unlock')} style={{display:'flex',alignItems:'center',gap:12,width:'100%',background:'rgba(255,255,255,0.02)',border:'1px solid rgba(255,255,255,0.07)',borderRadius:13,padding:'18px 22px',cursor:'pointer',textAlign:'left',color:T3}}>
              <span style={{fontSize:22,flexShrink:0}}>🔒</span>
              <div>
                <div style={{fontSize:15,fontWeight:700,marginBottom:3,color:'rgba(255,255,255,0.6)'}}>Usar {activePrompt.nombre} con tu IA</div>
                <div style={{fontSize:12}}>Disponible en Pro — desbloquea por 19€</div>
              </div>
            </button>
          )}
        </div>
      </div>
      {chatPanelEl}
    </div>
  );

  if(view==='tes') return(
    <div>
      <Nav/>
      <div style={{maxWidth:880,margin:'0 auto',padding:'40px 20px 100px'}}>
        <div style={{fontSize:28,fontWeight:800,letterSpacing:'-0.03em',marginBottom:6}}>Tecnología Explicada Simple</div>
        <div style={{fontSize:14,color:T2,marginBottom:40}}>Todo el contenido gratuito — en el canal que prefieras.</div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(220px,1fr))',gap:14}}>
          {[
            {icon:'🌐',name:'Web TES',sub:'tecnologiaexplicadasimple.com',url:'https://tecnologiaexplicadasimple.com',color:BLU},
            {icon:'▶️',name:'YouTube',sub:'@Tecnologia.Explicada.Simple',url:'https://www.youtube.com/@Tecnologia.Explicada.Simple',color:'#ff4444'},
            {icon:'📸',name:'Instagram',sub:'@tecnologia.explicada.simple',url:'https://www.instagram.com/tecnologia.explicada.simple',color:'#e1306c'},
            {icon:'🎵',name:'TikTok',sub:'@techexplicadasimple',url:'https://www.tiktok.com/@techexplicadasimple',color:'#69c9d0'}
          ].map(item=>(
            <a key={item.name} href={item.url} target="_blank" rel="noopener noreferrer"
              style={{background:CA,border:'1px solid '+CB,borderRadius:16,padding:24,display:'flex',flexDirection:'column',gap:12,textDecoration:'none',color:'#fff'}}
              onMouseEnter={e=>{e.currentTarget.style.background='rgba(255,255,255,0.06)';e.currentTarget.style.borderColor='rgba(255,255,255,0.14)';}}
              onMouseLeave={e=>{e.currentTarget.style.background=CA;e.currentTarget.style.borderColor=CB;}}>
              <span style={{fontSize:32}}>{item.icon}</span>
              <div>
                <div style={{fontSize:17,fontWeight:700,letterSpacing:'-0.02em',marginBottom:4}}>{item.name}</div>
                <div style={{fontSize:12,color:T3}}>{item.sub}</div>
              </div>
              <div style={{fontSize:13,color:item.color,fontWeight:600,marginTop:'auto'}}>Visitar →</div>
            </a>
          ))}
        </div>
        <div style={{marginTop:48,padding:24,background:'rgba(255,107,107,0.04)',border:'1px solid rgba(255,107,107,0.12)',borderRadius:16}}>
          <div style={{fontSize:15,fontWeight:700,marginBottom:8}}>¿Feedback sobre Agentes Brutales?</div>
          <div style={{fontSize:14,color:T2,marginBottom:16}}>Escríbenos por Instagram o deja un comentario en YouTube.</div>
          <a href="https://www.instagram.com/tecnologia.explicada.simple" target="_blank" rel="noopener noreferrer" style={{display:'inline-flex',alignItems:'center',gap:8,background:BLU,color:'#000',borderRadius:10,padding:'10px 20px',fontSize:13,fontWeight:700,textDecoration:'none'}}>Contactar por Instagram →</a>
        </div>
      </div>
    </div>
  );

  return null;
}

ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>
</body>
</html>
